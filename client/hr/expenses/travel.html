<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Requests | HRMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/hr/payroll/css/common.css">
  <style>
    .popup-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
    .popup-overlay.active { display: flex; }
    .popup-content { background: var(--white); width: 650px; max-width: 95%; border-radius: 12px; box-shadow: var(--glass-shadow); padding: 25px; animation: scaleIn 0.3s ease; }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
    .popup-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
    .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
    .form-group { flex: 1; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; font-family: inherit; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; transition: var(--transition); }
    .btn-primary { background: var(--primary-blue); color: var(--white); }
    .btn-primary:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="app-container">
    

    <main class="main-content">
      

      <div class="content-area animate-fade-in">
        <div class="kpi-cards">
          <div class="glass-card kpi-card">
            <div class="card-icon blue"><i class="fas fa-plane-departure"></i></div>
            <div class="card-info"><h3>Upcoming Trips</h3><h2>12</h2></div>
          </div>
          <div class="glass-card kpi-card">
            <div class="card-icon orange"><i class="fas fa-hourglass-half"></i></div>
            <div class="card-info"><h3>Pending Approvals</h3><h2>8</h2></div>
          </div>
          <div class="glass-card kpi-card">
            <div class="card-icon green"><i class="fas fa-check"></i></div>
            <div class="card-info"><h3>Approved</h3><h2>45</h2></div>
          </div>
        </div>

        <div class="table-container glass-card mt-4">
          <div class="table-responsive">
            <table class="modern-table">
              <thead>
                <tr>
                  <th>Employee</th>
                  <th>Destination</th>
                  <th>Dates</th>
                  <th>Est. Cost</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="travelTableBody">
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Popup -->
      <div class="popup-overlay" id="travelPopup">
        <div class="popup-content">
          <div class="popup-header">
            <h3>Travel Request</h3>
            <button class="popup-close" id="closeTravelBtn">&times;</button>
          </div>
          <form id="travelForm">
            <div class="form-group"><label>Destination</label><input type="text" id="travelDest" required></div>
            <div class="form-group"><label>Purpose of Travel</label><textarea id="travelPurpose" required></textarea></div>
            <div class="form-row">
              <div class="form-group"><label>Start Date</label><input type="date" id="travelStart" required></div>
              <div class="form-group"><label>End Date</label><input type="date" id="travelEnd" required></div>
            </div>
            <div class="form-group"><label>Estimated Cost ($)</label><input type="number" id="travelCost"></div>
            <div style="text-align: right;"><button type="submit" class="btn btn-primary">Submit Request</button></div>
          </form>
        </div>
      </div>
      
      <!-- Right Drawer for View -->
      <div class="drawer-overlay" id="viewDrawerOverlay"></div>
      <div class="right-drawer" id="viewDrawer">
        <div class="drawer-header">
          <h3>Review Request</h3>
          <button class="close-drawer" id="closeViewDrawer">&times;</button>
        </div>
        <div class="drawer-content">
          <div id="drawerContentBody">
            <p><strong>Employee:</strong> Alice Johnson</p>
            <p><strong>Destination:</strong> New York, USA</p>
            <p><strong>Dates:</strong> 2026-07-10 to 2026-07-15</p>
            <p><strong>Purpose:</strong> Client Meeting (Acme Corp)</p>
            <p><strong>Status:</strong> <span class="status-badge status-pending">Pending</span></p>
            <div style="margin-top: 20px; display:flex; gap: 10px;">
              <button class="btn btn-primary" onclick="showToast('Request Approved', 'success'); closeDrawer();">Approve</button>
              <button class="btn" style="background:var(--danger-red); color:var(--white);" onclick="showToast('Request Rejected', 'error'); closeDrawer();">Reject</button>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/hr/payroll/js/common.js"></script>
  <script src="./js/travel.js"></script>
</body>
</html>
