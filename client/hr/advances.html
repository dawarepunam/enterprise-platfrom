<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Advances - Enterprise HRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fa-solid fa-building" style="color:var(--primary-blue)"></i><h2>JMKC HR</h2></div>
            <div class="sidebar-menu-wrapper">
                <ul class="sidebar-menu"><li><a href="dashboard.html" class="menu-item"><i class="fa-solid fa-arrow-left"></i><span>Back</span></a></li></ul>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="header">
                <div class="header-left">
                    <button class="action-btn" id="sidebarToggle" style="border:none;"><i class="fa-solid fa-bars"></i></button>
                    <div class="breadcrumb"><span>Travel</span> > Cash Advances</div>
                </div>
                <div class="header-right"><div class="user-profile"><img src="https://ui-avatars.com/api/?name=Admin&background=2563EB&color=fff"></div></div>
            </header>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h1 style="font-size:1.5rem;">Cash Advance Requests</h1>
                <button class="btn btn-primary" onclick="openModal('advanceModal')"><i class="fa-solid fa-hand-holding-dollar"></i> Request Advance</button>
            </div>

            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Amount</th>
                            <th>Purpose</th>
                            <th>Requested On</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Rahul Sharma</td>
                            <td style="font-weight:600;">₹ 10,000</td>
                            <td>Client Meeting - Delhi</td>
                            <td>04 Jul 2026</td>
                            <td><span class="badge badge-warning">Pending Finance</span></td>
                            <td><button class="btn btn-outline btn-sm">Approve</button></td>
                        </tr>
                        <tr>
                            <td>Priya Patel</td>
                            <td style="font-weight:600;">₹ 5,000</td>
                            <td>Team Lunch Advance</td>
                            <td>01 Jul 2026</td>
                            <td><span class="badge badge-success">Disbursed</span></td>
                            <td><button class="btn btn-outline btn-sm">View</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Advance Modal -->
    <div class="modal-overlay" id="advanceModal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header"><h3>Request Cash Advance</h3><button class="modal-close"><i class="fa-solid fa-times"></i></button></div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Amount Needed (₹)</label>
                    <input type="number" class="form-control" placeholder="E.g. 5000">
                </div>
                <div class="form-group">
                    <label class="form-label">Purpose</label>
                    <input type="text" class="form-control" placeholder="E.g. Travel Expenses / Event">
                </div>
                <div class="form-group">
                    <label class="form-label">Expected Settlement Date</label>
                    <input type="date" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline close-modal-btn">Cancel</button>
                <button class="btn btn-primary" onclick="closeModal('advanceModal');showToast('Advance requested successfully!','success')">Submit Request</button>
            </div>
        </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
