<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exit Interviews - Enterprise HRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fa-solid fa-building" style="color:var(--primary-blue)"></i><h2>JMKC HR</h2></div>
            <div class="sidebar-menu-wrapper">
                <ul class="sidebar-menu"><li><a href="dashboard.html" class="menu-item"><i class="fa-solid fa-arrow-left"></i><span>Back</span></a></li></ul>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="header">
                <div class="header-left">
                    <button class="action-btn" id="sidebarToggle" style="border:none;"><i class="fa-solid fa-bars"></i></button>
                    <div class="breadcrumb"><span>Exit Management</span> > Exit Interviews</div>
                </div>
                <div class="header-right"><div class="user-profile"><img src="https://ui-avatars.com/api/?name=HR+Manager&background=2563EB&color=fff"></div></div>
            </header>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h1 style="font-size:1.5rem;">Exit Interviews & Feedback</h1>
            </div>

            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>LWD</th>
                            <th>Interview Date</th>
                            <th>Interviewer</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Sneha Joshi</td>
                            <td>15 Jul 2026</td>
                            <td>10 Jul 2026, 11:00 AM</td>
                            <td>HR Manager</td>
                            <td><span class="badge badge-warning">Scheduled</span></td>
                            <td><button class="btn btn-outline btn-sm">Start Interview</button></td>
                        </tr>
                        <tr>
                            <td>Karan Gupta</td>
                            <td>30 Jun 2026</td>
                            <td>28 Jun 2026, 03:00 PM</td>
                            <td>HR Manager</td>
                            <td><span class="badge badge-success">Completed</span></td>
                            <td><button class="btn btn-outline btn-sm">View Feedback</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
