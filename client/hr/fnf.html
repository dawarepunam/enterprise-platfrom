<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full & Final Settlement - Enterprise HRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    
    <style>
        .fnf-card { background: var(--white); border-radius: var(--radius-lg); padding: 24px; border: 1px solid var(--border-gray); box-shadow: var(--shadow-sm); margin-bottom: 24px; }
        .fnf-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 1px dashed var(--border-gray); padding-bottom: 16px; }
        .emp-info { display: flex; align-items: center; gap: 16px; }
        .emp-info img { width: 50px; height: 50px; border-radius: 50%; }
        .clearance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .cl-item { background: var(--bg-color); border: 1px solid var(--border-gray); border-radius: var(--radius-md); padding: 12px; text-align: center; }
        .cl-item i { font-size: 1.5rem; margin-bottom: 8px; }
        .cl-item.approved { border-color: var(--success-green); background: #dcfce7; }
        .cl-item.approved i { color: var(--success-green); }
        .cl-item.pending { border-color: var(--warning-orange); background: #fef9c3; }
        .cl-item.pending i { color: var(--warning-orange); }
        
        .settlement-summary { background: #f8fafc; border-radius: var(--radius-md); padding: 16px; display: flex; justify-content: space-between; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar placeholder -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="fa-solid fa-building" style="color:var(--primary-blue)"></i><h2>JMKC HR</h2></div>
            <div class="sidebar-menu-wrapper">
                <ul class="sidebar-menu"><li><a href="dashboard.html" class="menu-item"><i class="fa-solid fa-arrow-left"></i><span>Back</span></a></li></ul>
            </div>
        </aside>

        <div class="main-wrapper">
            <header class="header">
                <div class="header-left">
                    <button class="action-btn" id="sidebarToggle" style="border:none;"><i class="fa-solid fa-bars"></i></button>
                    <div class="breadcrumb"><span>Exit Management</span> > F&F Settlement</div>
                </div>
                <div class="header-right"><div class="user-profile"><img src="https://ui-avatars.com/api/?name=Payroll+Admin&background=2563EB&color=fff"></div></div>
            </header>

            <h1 style="font-size:1.5rem; margin-bottom:24px;">F&F Settlement Dashboard</h1>

            <div class="fnf-card">
                <div class="fnf-header">
                    <div class="emp-info">
                        <img src="https://ui-avatars.com/api/?name=Karan+Gupta">
                        <div>
                            <div style="font-size:1.1rem; font-weight:700; color:var(--dark-navy);">Karan Gupta (EMP088)</div>
                            <div style="font-size:.9rem; color:var(--text-gray);">LWD: 30 Jun 2026</div>
                        </div>
                    </div>
                    <div><span class="badge badge-warning">Processing</span></div>
                </div>

                <h4 style="margin-bottom:12px; color:var(--dark-navy);">Department Clearance Status</h4>
                <div class="clearance-grid">
                    <div class="cl-item approved"><i class="fa-solid fa-laptop"></i><div style="font-weight:600;">IT Asset</div><div style="font-size:.8rem;color:var(--text-gray);">Cleared</div></div>
                    <div class="cl-item approved"><i class="fa-solid fa-user-tie"></i><div style="font-weight:600;">Manager</div><div style="font-size:.8rem;color:var(--text-gray);">Handover Done</div></div>
                    <div class="cl-item pending"><i class="fa-solid fa-building-user"></i><div style="font-weight:600;">Admin</div><div style="font-size:.8rem;color:var(--text-gray);">Pending ID Return</div></div>
                    <div class="cl-item pending"><i class="fa-solid fa-indian-rupee-sign"></i><div style="font-weight:600;">Finance</div><div style="font-size:.8rem;color:var(--text-gray);">Pending Calculation</div></div>
                </div>

                <div class="settlement-summary">
                    <div><strong>Estimated F&F Amount:</strong> <span style="color:var(--text-gray); font-size:.9rem;">(Pending Calculation)</span></div>
                    <button class="btn btn-primary" disabled><i class="fa-solid fa-calculator"></i> Process F&F</button>
                </div>
            </div>

        </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/components.js"></script>
</body>
</html>
