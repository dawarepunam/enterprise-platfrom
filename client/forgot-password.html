<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - JMKC CRM</title>
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/forms.css" />
    <link rel="stylesheet" href="assets/css/auth.css" />
  </head>

  <body>
    <main class="auth-page-shell auth-page-shell-compact">
      <section class="auth-card auth-recovery-card auth-step-card">
        <div class="auth-step-pill">Password Recovery</div>
        <div class="auth-card-header">
          <div class="auth-card-icon">🔒</div>
          <div>
            <h1>Forgot Password?</h1>
            <p>Enter your registered email and we will send a 6-digit verification code.</p>
          </div>
        </div>

        <form id="forgotPasswordForm" class="auth-form">
          <div class="form-group auth-input-group">
            <label for="email">Email Address</label>
            <span class="auth-field-icon">EM</span>
            <input type="email" id="email" name="email"
              placeholder="Enter your registered email" required />
          </div>
          <button type="submit"
            class="btn btn-primary btn-full auth-submit">Send OTP</button>
        </form>

        <div class="auth-links auth-step-links">
          <a class="auth-link-animated" href="/login">Back to Login</a>
        </div>
        <footer class="auth-footer">Copyright © JMKC CRM · Created By Punam</footer>
      </section>
    </main>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/notifications.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>

</html>
