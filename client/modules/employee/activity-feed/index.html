<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Feed - Employee | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin-layout.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <style>
    .pm-main { background: #f4f7fe !important; display: block !important; }
    .pg-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .pg-hdr-left h1 { font-size: 22px; font-weight: 800; color: #2b3674; margin: 0; }
    .pg-hdr-left p  { font-size: 13px; color: #a3aed1; margin: 4px 0 0; }
    .filter-select { padding: 10px 16px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; background: #fff; }

    .act-card { background: #fff; border-radius: 20px; padding: 28px; box-shadow: 0 4px 24px rgba(112,144,176,0.1); max-width: 800px; margin: 0 auto; }
    .act-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid #f0f4ff; padding-bottom: 16px; }
    .act-title { font-size: 16px; font-weight: 800; color: #2b3674; display: flex; align-items: center; gap: 8px; }

    .act-timeline { display: flex; flex-direction: column; position: relative; }
    .act-timeline::before { content: ""; position: absolute; left: 20px; top: 0; bottom: 0; width: 2px; background: #f0f4ff; }
    
    .act-item { display: flex; gap: 16px; position: relative; margin-bottom: 24px; }
    .act-icon-wrap { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; z-index: 2; }
    .ai-task { background: rgba(57,101,255,0.1); color: #3965FF; }
    .ai-comment { background: rgba(5,205,153,0.1); color: #05CD99; }
    .ai-time { background: rgba(255,181,71,0.1); color: #FFB547; }
    .ai-login { background: rgba(67,24,255,0.1); color: #4318FF; }
    .ai-leave { background: rgba(238,93,80,0.1); color: #EE5D50; }
    .ai-project { background: rgba(236,72,153,0.1); color: #ec4899; }

    .act-content { flex: 1; background: #f8fafc; border-radius: 12px; padding: 16px; border: 1px solid #e2e8f0; }
    .act-text { font-size: 14px; color: #2b3674; font-weight: 600; margin-bottom: 4px; }
    .act-time { font-size: 12px; color: #a3aed1; }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div id="pm-header-root"></div>
    <main class="pm-main">
      <div class="pg-hdr">
        <div class="pg-hdr-left">
          <h1><i class="fa fa-stream" style="color:#3965FF;margin-right:8px;"></i>Activity Feed</h1>
          <p>Your complete history of actions, tasks, and events.</p>
        </div>
        <select class="filter-select" id="actFilter">
          <option value="">All Activity</option>
          <option value="task">Tasks</option>
          <option value="comment">Comments</option>
          <option value="time">Time Logs</option>
          <option value="login">Logins</option>
        </select>
      </div>

      <div class="act-card">
        <div class="act-hdr">
          <div class="act-title"><i class="fa fa-history"></i> All Recent Activity</div>
        </div>
        <div class="act-timeline" id="actFeed">
          <div style="text-align:center;padding:40px;color:#a3aed1;"><i class="fa fa-spinner fa-spin fa-2x"></i></div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="/modules/employee/emp-shell.js"></script>
<script src="/modules/employee/activity-feed/app.js"></script>
</body>
</html>
