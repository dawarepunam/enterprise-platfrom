<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Projects - Employee | JMKC CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/modules/admin/_shared/admin-layout.css" />
    <link rel="stylesheet" href="/modules/admin/_shared/admin.css" />
    <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
    <style>
        /* ── Page Override ── */
        
        .pm-main {
            background: #f4f7fe !important;
            display: block !important;
        }
        /* ── Page Header ── */
        
        .pg-hdr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .pg-hdr-left h1 {
            font-size: 22px;
            font-weight: 800;
            color: #2b3674;
            margin: 0;
        }
        
        .pg-hdr-left p {
            font-size: 13px;
            color: #a3aed1;
            margin: 4px 0 0;
        }
        
        .pg-hdr-right {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        /* ── Search & Filters ── */
        
        .filter-bar {
            background: #fff;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 4px 24px rgba(112, 144, 176, 0.1);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .srch-wrap {
            flex: 1;
            min-width: 200px;
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .srch-wrap i {
            position: absolute;
            left: 12px;
            color: #a3aed1;
        }
        
        .srch-wrap input {
            width: 100%;
            padding: 9px 12px 9px 36px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color .2s;
        }
        
        .srch-wrap input:focus {
            border-color: #3965FF;
        }
        
        .filter-sel {
            padding: 9px 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            color: #2b3674;
            cursor: pointer;
            background: #fff;
        }
        
        .filter-sel:focus {
            border-color: #3965FF;
        }
        
        .btn-export {
            padding: 9px 16px;
            background: #f4f7fe;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #2b3674;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-export:hover {
            background: #e2e8f0;
        }
        /* ── Stats Row ── */
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: #fff;
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 4px 24px rgba(112, 144, 176, 0.1);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .stat-icon.blue {
            background: rgba(57, 101, 255, 0.1);
            color: #3965FF;
        }
        
        .stat-icon.green {
            background: rgba(5, 205, 153, 0.1);
            color: #05CD99;
        }
        
        .stat-icon.orange {
            background: rgba(255, 181, 71, 0.1);
            color: #FFB547;
        }
        
        .stat-icon.red {
            background: rgba(238, 93, 80, 0.1);
            color: #EE5D50;
        }
        
        .stat-val {
            font-size: 24px;
            font-weight: 800;
            color: #2b3674;
        }
        
        .stat-lbl {
            font-size: 12px;
            color: #a3aed1;
            font-weight: 500;
        }
        /* ── Section header ── */
        
        .sec-title {
            font-size: 15px;
            font-weight: 700;
            color: #2b3674;
            margin: 0 0 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .sec-badge {
            background: rgba(57, 101, 255, 0.1);
            color: #3965FF;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        /* ── Project Grid ── */
        
        .proj-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        /* ── Project Card ── */
        
        .proj-card {
            background: #fff;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 4px 24px rgba(112, 144, 176, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform .25s, box-shadow .25s;
            cursor: pointer;
        }
        
        .proj-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 36px rgba(112, 144, 176, 0.2);
        }
        
        .proj-status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: 18px 18px 0 0;
        }
        
        .status-active {
            background: linear-gradient(90deg, #3965FF, #05CD99);
        }
        
        .status-completed {
            background: linear-gradient(90deg, #05CD99, #00B5D8);
        }
        
        .status-hold {
            background: linear-gradient(90deg, #FFB547, #EE5D50);
        }
        
        .status-assigned {
            background: linear-gradient(90deg, #a3aed1, #3965FF);
        }
        
        .pc-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .pc-name {
            font-size: 15px;
            font-weight: 700;
            color: #2b3674;
            line-height: 1.3;
        }
        
        .pc-client {
            font-size: 12px;
            color: #a3aed1;
            margin-top: 3px;
        }
        
        .pc-priority {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 9px;
            border-radius: 20px;
            white-space: nowrap;
        }
        
        .pri-high {
            background: rgba(238, 93, 80, 0.12);
            color: #EE5D50;
        }
        
        .pri-medium {
            background: rgba(255, 181, 71, 0.12);
            color: #FFB547;
        }
        
        .pri-low {
            background: rgba(5, 205, 153, 0.12);
            color: #05CD99;
        }
        
        .pri-critical {
            background: rgba(238, 93, 80, 0.2);
            color: #c0392b;
        }
        
        .pc-prog-lbl {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #a3aed1;
            margin-bottom: 5px;
        }
        
        .pc-bar {
            height: 6px;
            background: #f0f4ff;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 14px;
        }
        
        .pc-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3965FF, #05CD99);
            border-radius: 4px;
            transition: width .6s;
        }
        
        .pc-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        
        .pc-meta-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .pc-meta-lbl {
            font-size: 10px;
            color: #a3aed1;
            font-weight: 500;
        }
        
        .pc-meta-val {
            font-size: 12px;
            color: #2b3674;
            font-weight: 600;
        }
        
        .pc-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .pc-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            transition: .2s;
            border: none;
            min-width: 60px;
        }
        
        .pc-btn.solid {
            background: #3965FF;
            color: #fff;
        }
        
        .pc-btn.solid:hover {
            background: #274ccf;
        }
        
        .pc-btn.outline {
            border: 1.5px solid #e2e8f0;
            color: #2b3674;
            background: transparent;
        }
        
        .pc-btn.outline:hover {
            background: #f4f7fe;
        }
        /* ── Empty / Loading ── */
        
        .empty-box {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-box i {
            font-size: 48px;
            color: #a3aed1;
            margin-bottom: 16px;
            display: block;
        }
        
        .empty-box h3 {
            font-size: 18px;
            color: #2b3674;
            margin-bottom: 8px;
        }
        
        .empty-box p {
            color: #a3aed1;
            font-size: 13px;
        }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f4ff 25%, #e8edf8 50%, #f0f4ff 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 16px;
            height: 240px;
        }
        
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        /* ── Responsive ── */
        
        @media (max-width: 1200px) {
            .proj-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .proj-grid {
                grid-template-columns: 1fr;
            }
            .stats-row {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
  </head>

  <body>
    <div class="pm-shell">
      <div id="pm-sidebar-root"></div>
      <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
        <div id="pm-header-root"></div>

        <main class="pm-main">

          <!-- Page Header -->
          <div class="pg-hdr">
            <div class="pg-hdr-left">
              <h1><i class="fa fa-folder-open"
                  style="color:#3965FF;margin-right:8px;"></i>My Projects</h1>
              <p>All projects assigned to you, with progress and details.</p>
            </div>
            <div class="pg-hdr-right">
              <button class="btn-export" id="exportBtn"><i
                  class="fa fa-download"></i> Export CSV</button>
            </div>
          </div>

          <!-- Stats Row -->
          <div class="stats-row" id="statsRow">
            <div class="stat-card" style="cursor:pointer;"
              onclick="setProjectFilter('')">
              <div class="stat-icon blue"><i class="fa fa-briefcase"></i></div>
              <div>
                <div class="stat-val" id="statTotal">—</div>
                <div class="stat-lbl">Total Projects</div>
              </div>
            </div>
            <div class="stat-card" style="cursor:pointer;"
              onclick="setProjectFilter('active')">
              <div class="stat-icon green"><i
                  class="fa fa-check-circle"></i></div>
              <div>
                <div class="stat-val" id="statActive">—</div>
                <div class="stat-lbl">Active</div>
              </div>
            </div>
            <div class="stat-card" style="cursor:pointer;"
              onclick="setProjectFilter('hold')">
              <div class="stat-icon orange"><i
                  class="fa fa-pause-circle"></i></div>
              <div>
                <div class="stat-val" id="statOnHold">—</div>
                <div class="stat-lbl">On Hold</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon red"><i class="fa fa-flag"></i></div>
              <div>
                <div class="stat-val" id="statDeadlineToday">—</div>
                <div class="stat-lbl">Deadline Today</div>
              </div>
            </div>
          </div>

          <!-- Filter Bar -->
          <div class="filter-bar">
            <div class="srch-wrap">
              <i class="fa fa-search"></i>
              <input type="text" id="searchInput"
                placeholder="Search projects by name, client..." />
            </div>
            <select class="filter-sel" id="filterStatus">
              <option value>All Status</option>
              <option value="active">Active</option>
              <option value="completed">Completed</option>
              <option value="hold">On Hold</option>
              <option value="assigned">Assigned</option>
            </select>
            <select class="filter-sel" id="filterPriority">
              <option value>All Priority</option>
              <option value="Critical">Critical</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
            <select class="filter-sel" id="sortBy">
              <option value="updated">Recently Updated</option>
              <option value="deadline">Deadline</option>
              <option value="progress">Progress</option>
              <option value="priority">Priority</option>
            </select>
          </div>

          <!-- Projects Grid -->
          <div class="sec-title">
            All Assigned Projects <span class="sec-badge"
              id="projCount">Loading...</span>
          </div>
          <div class="proj-grid" id="projGrid">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
          </div>

        </main>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/modules/employee/emp-shell.js"></script>
    <script>
        let allProjects = [];

        function normId(value) {
            if (!value) return '';
            return String(value._id || value.id || value.userId || value).trim();
        }

        function normText(value) {
            return String(value || '').trim().toLowerCase();
        }

        function projectIncludesCurrentUser(project, user) {
            const uid = normId(user);
            const email = normText(user ? .email);
            const name = normText(user ? .name);
            if (!uid && !email && !name) return true;

            const directIds = [
                project.assignedManager,
                project.managerId,
                project.projectManager,
                project.teamLeadId,
                project.assignedBy
            ].map(normId);
            if (uid && directIds.includes(uid)) return true;

            const directEmails = [project.managerEmail, project.teamLeadEmail].map(normText);
            if (email && directEmails.includes(email)) return true;

            const directNames = [project.manager, project.teamLead, project.assignedByName].map(normText);
            if (name && directNames.includes(name)) return true;

            const memberSources = [
                ...(Array.isArray(project.members) ? project.members : []),
                ...(Array.isArray(project.teamMemberIds) ? project.teamMemberIds : []),
                ...(Array.isArray(project.teamMembers) ? project.teamMembers : []),
                ...(Array.isArray(project.allocatedTeam) ? project.allocatedTeam : []),
                ...(Array.isArray(project.milestones) ? project.milestones.flatMap(m => [
                    ...(m.assignedTeamMemberIds || []),
                    ...(m.assignedTeamMembers || [])
                ]) : [])
            ];

            return memberSources.some(member => {
                if (uid && [normId(member), normId(member ? .user), normId(member ? .userId)].includes(uid)) return true;
                if (email && [member ? .email, member ? .userEmail].map(normText).includes(email)) return true;
                if (name && [member ? .name, member ? .userName, member ? .employeeName, typeof member === 'string' ? member : ''].map(normText).includes(name)) return true;
                return false;
            });
        }

        document.addEventListener('DOMContentLoaded', async() => {
            await loadProjects();
            bindFilters();
            bindExport();
        });

        async function loadProjects() {
            try {
                const res = await apiRequest('/projects/employee');
                let rawList = Array.isArray(res) ? res : (res ? .data || res ? .projects || []);

                const currentUser = JSON.parse(localStorage.getItem("user") || localStorage.getItem("jmkc_user") || "{}");
                allProjects = rawList.length ? rawList : rawList.filter(p => projectIncludesCurrentUser(p, currentUser));

                updateStats();
                renderProjects(allProjects);
            } catch (e) {
                document.getElementById('projGrid').innerHTML = `
        <div class="empty-box">
          <i class="fa fa-exclamation-circle"></i>
          <h3>Could not load projects</h3>
          <p>${e.message || 'Server error'}</p>
        </div>`;
            }
        }

        function updateStats() {
            const today = new Date().toDateString();
            document.getElementById('statTotal').textContent = allProjects.length;
            document.getElementById('statActive').textContent = allProjects.filter(p => normalizeStatus(p) === 'active').length;
            document.getElementById('statOnHold').textContent = allProjects.filter(p => normalizeStatus(p) === 'hold').length;
            document.getElementById('statDeadlineToday').textContent = allProjects.filter(p => {
                const d = p.deadline || p.dueDate || p.endDate;
                return d && new Date(d).toDateString() === today;
            }).length;
        }

        function normalizeStatus(p) {
            const s = (p.status || '').toLowerCase();
            if (s.includes('complet')) return 'completed';
            if (s.includes('hold')) return 'hold';
            if (s.includes('assign')) return 'assigned';
            return 'active';
        }

        function getPriorityClass(p) {
            const pr = (p || '').toLowerCase();
            if (pr === 'critical') return 'pri-critical';
            if (pr === 'high') return 'pri-high';
            if (pr === 'low') return 'pri-low';
            return 'pri-medium';
        }

        function getStatusClass(p) {
            const s = normalizeStatus(p);
            if (s === 'completed') return 'status-completed';
            if (s === 'hold') return 'status-hold';
            if (s === 'assigned') return 'status-assigned';
            return 'status-active';
        }

        function renderProjects(list) {
            const grid = document.getElementById('projGrid');
            document.getElementById('projCount').textContent = list.length + ' found';

            if (!list.length) {
                grid.innerHTML = `<div class="empty-box"><i class="fa fa-folder-open"></i><h3>No Projects Found</h3><p>Try adjusting your filters or contact your project manager.</p></div>`;
                return;
            }

            grid.innerHTML = list.map(p => {
                const id = p._id || p.id;
                const name = p.projectName || p.name || 'Untitled Project';
                const client = p.clientName || p.client || '—';
                const progress = Math.min(p.progress || 0, 100);
                const priority = p.priority || 'Medium';
                const manager = p.manager || p.pmName || '—';
                const status = (p.status || 'Active');
                const deadline = p.deadline || p.dueDate || p.endDate;
                const startDate = p.startDate;
                const budget = p.budget ? '₹' + Number(p.budget).toLocaleString() : '—';
                const desc = p.description ? p.description.slice(0, 80) + '...' : 'No description provided.';
                const detailUrl = `/employee/project-detail?id=${id}`;

                return `
        <div class="proj-card" onclick="location='${detailUrl}'">
          <div class="proj-status-bar ${getStatusClass(p)}"></div>
          <div class="pc-top">
            <div>
              <div class="pc-name">${name}</div>
              <div class="pc-client"><i class="fa fa-building" style="margin-right:4px;"></i>${client}</div>
            </div>
            <span class="pc-priority ${getPriorityClass(priority)}">${priority}</span>
          </div>
          <div class="pc-prog-lbl"><span>Progress</span><span>${progress}%</span></div>
          <div class="pc-bar"><div class="pc-bar-fill" style="width:${progress}%"></div></div>
          <div class="pc-meta">
            <div class="pc-meta-item">
              <span class="pc-meta-lbl"><i class="fa fa-user-tie"></i> Manager</span>
              <span class="pc-meta-val">${manager}</span>
            </div>
            <div class="pc-meta-item">
              <span class="pc-meta-lbl"><i class="fa fa-calendar"></i> Deadline</span>
              <span class="pc-meta-val">${deadline ? new Date(deadline).toLocaleDateString('en-GB') : '—'}</span>
            </div>
            <div class="pc-meta-item">
              <span class="pc-meta-lbl"><i class="fa fa-info-circle"></i> Status</span>
              <span class="pc-meta-val">${status}</span>
            </div>
            <div class="pc-meta-item">
              <span class="pc-meta-lbl"><i class="fa fa-rupee-sign"></i> Budget</span>
              <span class="pc-meta-val">${budget}</span>
            </div>
          </div>
          <div class="pc-actions" onclick="event.stopPropagation()">
            <a href="${detailUrl}" class="pc-btn solid">View Details</a>
            <a href="/employee/tasks?project=${id}" class="pc-btn outline">Tasks</a>
            <a href="/employee/files?project=${id}" class="pc-btn outline">Files</a>
            <a href="/employee/chat?project=${id}" class="pc-btn outline">Chat</a>
          </div>
        </div>
      `;
            }).join('');
        }

        function bindFilters() {
            ['searchInput', 'filterStatus', 'filterPriority', 'sortBy'].forEach(id => {
                document.getElementById(id) ? .addEventListener('input', applyFilters);
                document.getElementById(id) ? .addEventListener('change', applyFilters);
            });
        }

        window.setProjectFilter = function(statusVal) {
            document.getElementById('filterStatus').value = statusVal;
            applyFilters();
        };

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const priority = document.getElementById('filterPriority').value;
            const sort = document.getElementById('sortBy').value;

            let list = allProjects.filter(p => {
                const name = (p.projectName || p.name || '').toLowerCase();
                const client = (p.clientName || p.client || '').toLowerCase();
                const matchSearch = !search || name.includes(search) || client.includes(search);
                const matchStatus = !status || normalizeStatus(p) === status;
                const matchPriority = !priority || (p.priority || '') === priority;
                return matchSearch && matchStatus && matchPriority;
            });

            list.sort((a, b) => {
                if (sort === 'deadline') return new Date(a.deadline || a.dueDate || 0) - new Date(b.deadline || b.dueDate || 0);
                if (sort === 'progress') return (b.progress || 0) - (a.progress || 0);
                if (sort === 'priority') {
                    const w = {
                        Critical: 4,
                        High: 3,
                        Medium: 2,
                        Low: 1
                    };
                    return (w[b.priority] || 0) - (w[a.priority] || 0);
                }
                return new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0);
            });

            renderProjects(list);
        }

        function bindExport() {
            document.getElementById('exportBtn') ? .addEventListener('click', () => {
                const csv = ['Name,Client,Status,Priority,Progress,Deadline,Manager'].concat(
                    allProjects.map(p => `"${p.projectName||p.name||''}","${p.clientName||p.client||''}","${p.status||''}","${p.priority||''}","${p.progress||0}%","${p.deadline||p.dueDate||''}","${p.manager||''}"`)
                ).join('\n');
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([csv], {
                    type: 'text/csv'
                }));
                a.download = 'my_projects.csv';
                a.click();
            });
        }
    </script>
  </body>
