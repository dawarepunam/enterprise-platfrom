<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board - Employee | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin-layout.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <style>
    .pm-main { background: #f4f7fe !important; display: flex !important; flex-direction: column !important; height: calc(100vh - 80px) !important; }

    /* Header */
    .pg-hdr { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 0; flex-wrap: wrap; gap: 12px; }
    .pg-hdr-left h1 { font-size: 22px; font-weight: 800; color: #2b3674; margin: 0; }
    .pg-hdr-left p  { font-size: 13px; color: #a3aed1; margin: 4px 0 0; }
    .hdr-actions { display: flex; gap: 12px; align-items: center; }
    .filter-select { padding: 8px 14px; border-radius: 10px; border: 1.5px solid #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; background: #fff; }

    /* Kanban Board */
    .kb-board { flex: 1; display: flex; gap: 20px; padding: 20px 24px 24px; overflow-x: auto; min-height: 0; }
    .kb-col { display: flex; flex-direction: column; min-width: 280px; width: 280px; }
    .kb-col-hdr {
      background: #fff; border-radius: 16px 16px 0 0; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
      border-top: 4px solid var(--cc, #e2e8f0); box-shadow: 0 2px 8px rgba(112,144,176,0.06);
    }
    .kb-col-hdr span:first-child { font-size: 14px; font-weight: 800; color: #2b3674; display: flex; align-items: center; gap: 8px; }
    .kb-count { background: #f4f7fe; color: #5d6d8a; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    .kb-body {
      flex: 1; background: #f0f4ff; border-radius: 0 0 16px 16px; padding: 12px; display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto; min-height: 200px; transition: background .2s;
    }
    .kb-body.drag-over { background: #e0e8ff; }

    /* Task Cards */
    .kb-card {
      background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 10px rgba(112,144,176,0.08); cursor: grab; transition: .2s;
      border-left: 3px solid transparent;
    }
    .kb-card:hover { box-shadow: 0 6px 20px rgba(57,101,255,0.1); transform: translateY(-2px); }
    .kb-card.dragging { opacity: 0.5; cursor: grabbing; }
    .kb-card.p-critical { border-left-color: #EE5D50; }
    .kb-card.p-high { border-left-color: #FFB547; }
    .kb-card.p-medium { border-left-color: #3965FF; }
    .kb-card.p-low { border-left-color: #05CD99; }

    .kc-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .kc-title { font-size: 13px; font-weight: 700; color: #2b3674; line-height: 1.3; }
    .kc-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid #f0f4ff; }
    .kc-due { font-size: 11px; color: #a3aed1; display: flex; align-items: center; gap: 4px; }
    .kc-avatar { width: 24px; height: 24px; border-radius: 50%; background: #3965FF; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    
    .priority-badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
    .pb-critical { background: rgba(238,93,80,0.1); color: #EE5D50; }
    .pb-high { background: rgba(255,181,71,0.1); color: #FFB547; }
    .pb-medium { background: rgba(57,101,255,0.1); color: #3965FF; }
    .pb-low { background: rgba(5,205,153,0.1); color: #05CD99; }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div id="pm-header-root"></div>
    <main class="pm-main">
      <div class="pg-hdr">
        <div class="pg-hdr-left">
          <h1><i class="fa fa-columns" style="color:#3965FF;margin-right:8px;"></i>Kanban Board</h1>
          <p>Drag and drop tasks across stages to track your progress.</p>
        </div>
        <div class="hdr-actions">
          <select class="filter-select" id="kbProjectFilter"><option value="">All Projects</option></select>
          <select class="filter-select" id="kbPriorityFilter">
            <option value="">All Priority</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>

      <div class="kb-board">
        <div class="kb-col">
          <div class="kb-col-hdr" style="--cc:#FFB547">
            <span><i class="fa fa-circle" style="color:#FFB547;"></i> Todo</span>
            <span class="kb-count" id="kbcTodo">0</span>
          </div>
          <div class="kb-body" id="kbTodo" ondragover="event.preventDefault()" ondrop="drop(event,'pending')"></div>
        </div>
        <div class="kb-col">
          <div class="kb-col-hdr" style="--cc:#3965FF">
            <span><i class="fa fa-spinner" style="color:#3965FF;"></i> In Progress</span>
            <span class="kb-count" id="kbcProg">0</span>
          </div>
          <div class="kb-body" id="kbProg" ondragover="event.preventDefault()" ondrop="drop(event,'in-progress')"></div>
        </div>
        <div class="kb-col">
          <div class="kb-col-hdr" style="--cc:#4318FF">
            <span><i class="fa fa-eye" style="color:#4318FF;"></i> Review</span>
            <span class="kb-count" id="kbcRev">0</span>
          </div>
          <div class="kb-body" id="kbRev" ondragover="event.preventDefault()" ondrop="drop(event,'review')"></div>
        </div>
        <div class="kb-col">
          <div class="kb-col-hdr" style="--cc:#05CD99">
            <span><i class="fa fa-check-circle" style="color:#05CD99;"></i> Done</span>
            <span class="kb-count" id="kbcDone">0</span>
          </div>
          <div class="kb-body" id="kbDone" ondragover="event.preventDefault()" ondrop="drop(event,'done')"></div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="/modules/employee/emp-shell.js"></script>
<script src="/modules/employee/kanban-board/app.js"></script>
</body>
</html>
