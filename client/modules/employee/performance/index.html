<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance - Employee | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin-layout.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <style>
    .pm-main { background: #f4f7fe !important; display: block !important; }
    .pg-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .pg-hdr-left h1 { font-size: 22px; font-weight: 800; color: #2b3674; margin: 0; }
    .pg-hdr-left p  { font-size: 13px; color: #a3aed1; margin: 4px 0 0; }
    .hdr-actions { display: flex; gap: 12px; align-items: center; }
    .filter-select { padding: 10px 16px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; background: #fff; }
    .btn-download { background: #3965FF; color: #fff; padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: .2s; }
    .btn-download:hover { background: #274ccf; }

    /* Stats */
    .perf-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .psc { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 24px rgba(112,144,176,0.1); text-align: center; }
    .psc-val { font-size: 28px; font-weight: 800; color: #2b3674; margin-bottom: 6px; }
    .psc-lbl { font-size: 12px; color: #a3aed1; font-weight: 600; text-transform: uppercase; }

    /* Charts */
    .chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 24px; }
    .chart-card { background: #fff; border-radius: 20px; padding: 24px; box-shadow: 0 4px 24px rgba(112,144,176,0.1); }
    .cc-title { font-size: 16px; font-weight: 800; color: #2b3674; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .cc-title i { color: #3965FF; }

    /* KPI List */
    .kpi-list { display: flex; flex-direction: column; gap: 12px; }
    .kpi-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f4ff; }
    .kpi-row:last-child { border-bottom: none; }
    .kpi-name { font-size: 13px; font-weight: 600; color: #2b3674; }
    .kpi-score { font-size: 14px; font-weight: 800; color: #05CD99; }

    /* Badges */
    .badges-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 12px; }
    .b-wrap { text-align: center; padding: 16px 10px; border-radius: 12px; background: #f8fafc; border: 1px solid #f0f4ff; }
    .b-em { font-size: 28px; margin-bottom: 8px; }
    .b-name { font-size: 11px; font-weight: 700; color: #5d6d8a; }
    .badges-empty { text-align: center; padding: 24px; color: #a3aed1; font-size: 13px; }

    @media (max-width: 900px) { .perf-stats-grid { grid-template-columns: repeat(2,1fr); } .chart-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div id="pm-header-root"></div>
    <main class="pm-main">
      <div class="pg-hdr">
        <div class="pg-hdr-left">
          <h1><i class="fa fa-chart-line" style="color:#3965FF;margin-right:8px;"></i>Performance</h1>
          <p>Track your productivity, KPIs, and achievements over time.</p>
        </div>
        <div class="hdr-actions">
          <select class="filter-select" id="perfFilter">
            <option value="q1">Q1 2026</option>
            <option value="q2">Q2 2026</option>
            <option value="q3">Q3 2026</option>
          </select>
          <button class="btn-download" id="btnExportPdf"><i class="fa fa-file-pdf"></i> Export Report</button>
        </div>
      </div>

      <div class="perf-stats-grid" id="perfStatsGrid">
        <div class="psc"><div class="psc-val" id="valProductivity">—</div><div class="psc-lbl">Productivity</div></div>
        <div class="psc"><div class="psc-val" id="valTasks">—</div><div class="psc-lbl">Tasks Done</div></div>
        <div class="psc"><div class="psc-val" id="valAttendance">—</div><div class="psc-lbl">Attendance</div></div>
        <div class="psc"><div class="psc-val" id="valMeetings">—</div><div class="psc-lbl">Meetings</div></div>
      </div>

      <div class="chart-grid">
        <div class="chart-card">
          <div class="cc-title"><i class="fa fa-chart-area"></i> Productivity Trend</div>
          <canvas id="productivityChart" height="250"></canvas>
        </div>
        <div class="chart-card">
          <div class="cc-title"><i class="fa fa-tasks"></i> Task Breakdown</div>
          <canvas id="taskChart" height="200"></canvas>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
        <div class="chart-card">
          <div class="cc-title"><i class="fa fa-trophy"></i> KPI Scores</div>
          <div class="kpi-list" id="kpiList"></div>
        </div>
        <div class="chart-card">
          <div class="cc-title"><i class="fa fa-medal"></i> Earned Badges</div>
          <div class="badges-grid" id="badgesGrid">
            <div style="text-align:center;padding:20px;color:#a3aed1;grid-column:1/-1;"><i class="fa fa-spinner fa-spin"></i></div>
          </div>
          <div class="badges-empty" id="badgesEmpty" style="display:none">No badges earned yet.</div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="/modules/employee/emp-shell.js"></script>
<script src="/modules/employee/performance/app.js"></script>
</body>
</html>
