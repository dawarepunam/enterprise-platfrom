<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Details - Employee | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin-layout.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <style>
    .pm-main { background: #f4f7fe !important; display: block !important; }

    /* Action Group */
    .td-action-group { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .action-btn { padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: .2s; }
    .btn-start { background: #05CD99; color: #fff; }
    .btn-start:hover { background: #04b083; }
    .btn-pause { background: #FFB547; color: #fff; }
    .btn-submit { background: #3965FF; color: #fff; }
    .btn-submit:hover { background: #274ccf; }

    /* Main Layout */
    .td-layout { display: grid; grid-template-columns: 1fr 360px; gap: 28px; align-items: start; }
    .td-card { background: #fff; border-radius: 20px; padding: 28px; box-shadow: 0 4px 24px rgba(112,144,176,0.1); margin-bottom: 24px; }

    /* Skeleton */
    #tdSkeleton .skeleton { background: #f0f4ff; border-radius: 10px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* Badges & Title */
    .td-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .td-title { font-size: 28px; font-weight: 800; color: #2b3674; margin-bottom: 20px; line-height: 1.3; }

    /* Meta Row */
    .td-meta-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 24px; padding: 20px; background: #f8fafc; border-radius: 16px; }
    .tm-item { display: flex; flex-direction: column; gap: 4px; }
    .tm-lbl { font-size: 11px; color: #a3aed1; font-weight: 600; text-transform: uppercase; }
    .tm-val { font-size: 14px; color: #2b3674; font-weight: 700; }

    /* Progress Ring */
    .progress-ring-wrap { position: relative; display: flex; align-items: center; gap: 24px; margin-bottom: 24px; padding: 24px; background: #f8fafc; border-radius: 16px; }
    .progress-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #2b3674; }

    /* Description */
    .td-desc { font-size: 15px; color: #5d6d8a; line-height: 1.7; margin-bottom: 24px; }

    /* Checklist */
    .cl-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .cl-title { font-size: 16px; font-weight: 800; color: #2b3674; display: flex; align-items: center; gap: 8px; }
    .cl-title i { color: #3965FF; }
    .checklist-count { font-size: 12px; font-weight: 700; background: #f4f7fe; color: #5d6d8a; padding: 4px 10px; border-radius: 20px; }
    .cl-prog { height: 6px; background: #f0f4ff; border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
    .checklist-progress-fill { height: 100%; background: #05CD99; border-radius: 4px; transition: width .4s; }
    .checklist-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .cl-add { display: flex; gap: 10px; margin-top: 8px; }
    .checklist-add-input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1.5px solid #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; background: #f8fafc; }
    .checklist-add-input:focus { border-color: #3965FF; }
    .checklist-add-btn { padding: 10px 18px; border-radius: 10px; background: #3965FF; color: #fff; font-size: 13px; font-weight: 700; border: none; cursor: pointer; }

    /* Attachments */
    .attachments-list { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
    .upload-btn { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 10px; background: #f4f7fe; border: 1.5px dashed #a3aed1; color: #5d6d8a; cursor: pointer; font-size: 13px; font-weight: 600; transition: .2s; }
    .upload-btn:hover { border-color: #3965FF; color: #3965FF; }

    /* Info Grid */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .ig-item { padding: 16px; background: #f8fafc; border-radius: 12px; }
    .ig-lbl { font-size: 11px; color: #a3aed1; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .ig-val { font-size: 14px; color: #2b3674; font-weight: 700; }

    /* Comments */
    .comments-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 16px; max-height: 400px; overflow-y: auto; }
    .typing-indicator { font-size: 12px; color: #a3aed1; font-style: italic; margin-bottom: 8px; }
    .comment-compose { background: #f8fafc; border-radius: 16px; padding: 16px; border: 1.5px solid #e2e8f0; }
    .comment-textarea { width: 100%; background: transparent; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 14px; color: #2b3674; resize: none; line-height: 1.5; margin-bottom: 10px; }
    .comment-bottom { display: flex; justify-content: space-between; align-items: center; }
    .comment-send-btn { background: #3965FF; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; }

    /* Timeline */
    .timeline-list { display: flex; flex-direction: column; gap: 12px; }

    /* Modal */
    .modal-overlay { position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(43,54,116,0.4); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: #fff; border-radius: 20px; padding: 28px; width: 420px; max-width: 90%; box-shadow: 0 10px 40px rgba(112,144,176,0.2); }
    .modal-title { font-size: 18px; font-weight: 800; color: #2b3674; margin-bottom: 20px; }
    .form-grp { margin-bottom: 16px; }
    .form-lbl { display: block; font-size: 12px; font-weight: 600; color: #2b3674; margin-bottom: 6px; }
    .form-ctrl { width: 100%; padding: 12px; border-radius: 10px; border: 1.5px solid #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; background: #f4f7fe; }
    .form-ctrl:focus { border-color: #3965FF; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px; }
    .btn-cancel { padding: 10px 20px; border-radius: 10px; background: #f4f7fe; color: #2b3674; font-size: 13px; font-weight: 700; border: none; cursor: pointer; }
    .btn-confirm { padding: 10px 20px; border-radius: 10px; background: #3965FF; color: #fff; font-size: 13px; font-weight: 700; border: none; cursor: pointer; }

    @media (max-width: 1024px) { .td-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div id="pm-header-root"></div>
    <main class="pm-main">

      <!-- Action Group -->
      <div class="td-action-group" id="taskActionGroup" style="display:none">
        <button class="action-btn btn-start" id="btnStart"><i class="fa fa-play"></i> Start</button>
        <button class="action-btn btn-pause" id="btnPause" style="display:none"><i class="fa fa-pause"></i> Pause</button>
        <button class="action-btn btn-submit" id="btnSubmit"><i class="fa fa-paper-plane"></i> Submit</button>
      </div>

      <!-- Skeleton -->
      <div id="tdSkeleton">
        <div class="skeleton" style="height:40px;width:60%;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:24px;width:40%;margin-bottom:24px;"></div>
        <div class="skeleton" style="height:100px;margin-bottom:20px;"></div>
        <div class="skeleton" style="height:200px;"></div>
      </div>

      <!-- Content -->
      <div id="tdContent" style="display:none">
        <div class="td-badges" id="tdBadges"></div>
        <h1 class="td-title" id="tdTitle"></h1>

        <div class="td-layout">
          <!-- Left Column -->
          <div>
            <div class="td-card">
              <div class="td-meta-row" id="tdMetaRow"></div>

              <h3 style="font-size:16px;font-weight:800;color:#2b3674;margin-bottom:12px;display:flex;align-items:center;gap:8px;"><i class="fa fa-align-left" style="color:#3965FF;"></i> Description</h3>
              <div class="td-desc" id="tdDescription">No description provided.</div>

              <!-- Progress Ring -->
              <div class="progress-ring-wrap" style="position:relative;padding:24px;background:#f8fafc;border-radius:16px;">
                <svg width="100" height="100" viewBox="0 0 100 100" style="flex-shrink:0;">
                  <circle cx="50" cy="50" r="40" fill="none" stroke="#f0f4ff" stroke-width="10"/>
                  <defs><linearGradient id="progGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3965FF"/><stop offset="100%" stop-color="#4318FF"/></linearGradient></defs>
                  <circle id="progressRing" cx="50" cy="50" r="40" fill="none" stroke="url(#progGrad)" stroke-width="10" stroke-dasharray="251" stroke-dashoffset="251" stroke-linecap="round" transform="rotate(-90 50 50)"/>
                </svg>
                <div style="position:absolute;left:24px;top:24px;width:100px;height:100px;display:flex;align-items:center;justify-content:center;">
                  <span id="progressText" style="font-size:18px;font-weight:800;color:#2b3674;">0%</span>
                </div>
                <div style="flex:1;padding-left:16px;"><h4 style="font-size:16px;font-weight:800;color:#2b3674;margin-bottom:4px;">Completion Progress</h4><p style="font-size:13px;color:#a3aed1;">Based on completed checklist items</p></div>
              </div>
            </div>

            <!-- Checklist -->
            <div class="td-card">
              <div class="cl-hdr">
                <div class="cl-title"><i class="fa fa-check-square"></i> Checklist</div>
                <span class="checklist-count" id="checklistCount">0/0</span>
              </div>
              <div class="cl-prog"><div class="checklist-progress-fill" id="checklistProgressFill" style="width:0%"></div></div>
              <div class="checklist-items" id="checklistItems"></div>
              <div class="cl-add">
                <input type="text" class="checklist-add-input" id="checklistInput" placeholder="Add checklist item..."/>
                <button class="checklist-add-btn" id="checklistAddBtn">+ Add</button>
              </div>
            </div>

            <!-- Attachments -->
            <div class="td-card">
              <h3 style="font-size:16px;font-weight:800;color:#2b3674;margin-bottom:16px;display:flex;align-items:center;gap:8px;"><i class="fa fa-paperclip" style="color:#3965FF;"></i> Attachments</h3>
              <div class="attachments-list" id="attachmentsList"></div>
              <label class="upload-btn" id="uploadLabel"><i class="fa fa-cloud-upload-alt"></i> Upload File<input type="file" id="fileInput" multiple style="display:none"/></label>
            </div>

            <!-- Comments -->
            <div class="td-card">
              <h3 style="font-size:16px;font-weight:800;color:#2b3674;margin-bottom:16px;display:flex;align-items:center;gap:8px;"><i class="fa fa-comments" style="color:#3965FF;"></i> Comments</h3>
              <div class="comments-list" id="commentsList"></div>
              <div class="typing-indicator" id="typingIndicator" style="display:none"><span id="typingText"></span> is typing...</div>
              <div class="comment-compose">
                <textarea id="commentInput" class="comment-textarea" placeholder="Add a comment... (@mention teammates)" rows="3"></textarea>
                <div class="comment-bottom">
                  <label style="cursor:pointer;color:#a3aed1;font-size:14px;"><i class="fa fa-paperclip"></i><input type="file" id="commentFileInput" multiple style="display:none"/></label>
                  <button class="comment-send-btn" id="commentSendBtn"><i class="fa fa-paper-plane"></i> Send</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Right Column -->
          <div>
            <div class="td-card">
              <h3 style="font-size:16px;font-weight:800;color:#2b3674;margin-bottom:16px;display:flex;align-items:center;gap:8px;"><i class="fa fa-info-circle" style="color:#3965FF;"></i> Task Info</h3>
              <div class="info-grid" id="infoGrid"></div>
            </div>

            <div class="td-card" id="subtasksSection" style="display:none">
              <h3 style="font-size:16px;font-weight:800;color:#2b3674;margin-bottom:16px;">Sub-tasks</h3>
              <div id="subtaskList"></div>
            </div>

            <div class="td-card" id="depsSection" style="display:none">
              <h3 style="font-size:16px;font-weight:800;color:#2b3674;margin-bottom:16px;">Dependencies</h3>
              <div id="depsList"></div>
            </div>

            <div class="td-card">
              <h3 style="font-size:16px;font-weight:800;color:#2b3674;margin-bottom:16px;display:flex;align-items:center;gap:8px;"><i class="fa fa-history" style="color:#3965FF;"></i> Activity Timeline</h3>
              <div class="timeline-list" id="timelineList"></div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Submit Modal -->
<div class="modal-overlay" id="submitModal" style="display:none">
  <div class="modal-box">
    <div class="modal-title"><i class="fa fa-check-circle" style="color:#05CD99;"></i> Submit Task for Review</div>
    <div class="form-grp">
      <label class="form-lbl">Hours Spent</label>
      <input type="number" class="form-ctrl" id="submitHours" placeholder="e.g. 4.5" min="0" step="0.5"/>
    </div>
    <div class="form-grp">
      <label class="form-lbl">Work Summary</label>
      <textarea class="form-ctrl" id="submitNote" rows="4" placeholder="Describe your work..." style="resize:vertical;"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="submitCancel">Cancel</button>
      <button class="btn-confirm" id="submitConfirm"><i class="fa fa-paper-plane"></i> Submit for Review</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/modules/employee/emp-shell.js"></script>
<script src="/modules/employee/task-detail/app.js"></script>
</body>
</html>
