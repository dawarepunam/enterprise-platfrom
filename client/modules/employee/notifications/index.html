<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications - Employee | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin-layout.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <style>
    .pm-main { background: #f4f7fe !important; display: block !important; }
    .pg-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .pg-hdr-left h1 { font-size: 22px; font-weight: 800; color: #2b3674; margin: 0; }
    .pg-hdr-left p  { font-size: 13px; color: #a3aed1; margin: 4px 0 0; }

    .hdr-actions { display: flex; gap: 12px; align-items: center; }
    .btn-ghost { background: #fff; color: #3965FF; padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 700; border: 1.5px solid #3965FF; cursor: pointer; transition: .2s; }
    .btn-ghost:hover { background: #3965FF; color: #fff; }
    .filter-select { padding: 10px 16px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; background: #fff; }

    .notif-wrap { max-width: 800px; margin: 0 auto; }
    .notif-card { background: #fff; border-radius: 20px; padding: 8px; box-shadow: 0 4px 24px rgba(112,144,176,0.1); }
    
    #notifList { display: flex; flex-direction: column; }
    .notif-item { display: flex; gap: 16px; padding: 20px; border-bottom: 1px solid #f0f4ff; cursor: pointer; transition: .2s; border-radius: 12px; }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: #f8fafc; }
    .notif-item.unread { background: rgba(57,101,255,0.04); }

    .notif-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .ni-task { background: rgba(57,101,255,0.1); color: #3965FF; }
    .ni-project { background: rgba(236,72,153,0.1); color: #ec4899; }
    .ni-leave { background: rgba(238,93,80,0.1); color: #EE5D50; }
    .ni-mention { background: rgba(5,205,153,0.1); color: #05CD99; }
    .ni-system { background: rgba(67,24,255,0.1); color: #4318FF; }

    .notif-body { flex: 1; }
    .notif-title { font-size: 14px; font-weight: 700; color: #2b3674; margin-bottom: 4px; }
    .notif-item.unread .notif-title::after { content: ""; width: 8px; height: 8px; background: #3965FF; border-radius: 50%; display: inline-block; margin-left: 8px; vertical-align: middle; }
    .notif-desc { font-size: 13px; color: #5d6d8a; line-height: 1.4; }
    .notif-time { font-size: 11px; color: #a3aed1; margin-top: 4px; }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div id="pm-header-root"></div>
    <main class="pm-main">
      <div class="pg-hdr">
        <div class="pg-hdr-left">
          <h1><i class="fa fa-bell" style="color:#3965FF;margin-right:8px;"></i>Notifications</h1>
          <p id="notifSubtitle">All your notifications in one place.</p>
        </div>
        <div class="hdr-actions">
          <button class="btn-ghost" id="btnMarkAll"><i class="fa fa-check-double"></i> Mark All Read</button>
          <select class="filter-select" id="notifFilter">
            <option value="">All</option>
            <option value="unread">Unread</option>
            <option value="task">Tasks</option>
            <option value="project">Projects</option>
            <option value="leave">Leave</option>
            <option value="mention">Mentions</option>
          </select>
        </div>
      </div>

      <div class="notif-wrap">
        <div class="notif-card">
          <div id="notifList">
            <div style="text-align:center;padding:40px;color:#a3aed1;"><i class="fa fa-spinner fa-spin fa-2x"></i></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="/modules/employee/emp-shell.js"></script>
<script src="/modules/employee/notifications/app.js"></script>
</body>
</html>
