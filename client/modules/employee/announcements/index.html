<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcements - Employee | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin-layout.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <style>
    .pm-main { background: #f4f7fe !important; display: block !important; }
    .pg-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .pg-hdr-left h1 { font-size: 22px; font-weight: 800; color: #2b3674; margin: 0; }
    .pg-hdr-left p  { font-size: 13px; color: #a3aed1; margin: 4px 0 0; }
    .filter-select { padding: 10px 16px; border-radius: 12px; border: 1.5px solid #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; background: #fff; }

    #annList { display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: 0 auto; }

    .ann-card { background: #fff; border-radius: 20px; padding: 28px; box-shadow: 0 4px 24px rgba(112,144,176,0.08); border-left: 5px solid #e2e8f0; transition: .2s; }
    .ann-card:hover { box-shadow: 0 10px 30px rgba(112,144,176,0.15); transform: translateY(-2px); }
    .ann-card.important { border-left-color: #EE5D50; }
    .ann-card.general { border-left-color: #3965FF; }
    .ann-card.event { border-left-color: #05CD99; }

    .ann-top { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .ann-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .ab-important { background: rgba(238,93,80,0.1); color: #EE5D50; }
    .ab-general { background: rgba(57,101,255,0.1); color: #3965FF; }
    .ab-event { background: rgba(5,205,153,0.1); color: #05CD99; }
    .ann-date { font-size: 12px; color: #a3aed1; font-weight: 600; }

    .ann-title { font-size: 18px; font-weight: 800; color: #2b3674; margin-bottom: 10px; line-height: 1.3; }
    .ann-body { font-size: 14px; color: #5d6d8a; line-height: 1.6; margin-bottom: 16px; }
    .ann-meta { font-size: 12px; color: #a3aed1; display: flex; gap: 12px; align-items: center; }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div id="pm-header-root"></div>
    <main class="pm-main">
      <div class="pg-hdr">
        <div class="pg-hdr-left">
          <h1><i class="fa fa-bullhorn" style="color:#3965FF;margin-right:8px;"></i>Announcements</h1>
          <p>Company-wide updates, events, and important communications.</p>
        </div>
        <select class="filter-select" id="annFilter">
          <option value="">All</option>
          <option value="important">Important</option>
          <option value="general">General</option>
          <option value="event">Events</option>
        </select>
      </div>

      <div id="annList">
        <div style="text-align:center;padding:40px;color:#a3aed1;"><i class="fa fa-spinner fa-spin fa-2x"></i></div>
      </div>
    </main>
  </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="/modules/employee/emp-shell.js"></script>
<script src="/modules/employee/announcements/app.js"></script>
</body>
</html>
