<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../../../assets/images/logo.png" />
    <title>Manager Budget</title>
    <link rel="stylesheet" href="../../../assets/css/global.css" />
    <link rel="stylesheet" href="../../../assets/css/role-workspace.css" />
    <link rel="stylesheet" href="../manager-workspace.css" />
</head>
<body>
    <div id="navbar"></div>
    <div class="workspace-layout">
        <div id="sidebar"></div>
        <main class="workspace-page">
            <div class="manager-shell">
                <section class="manager-hero">
                    <div class="manager-hero-grid">
                        <div>
                            <p class="eyebrow-line">Budget Tracking</p>
                            <h1>Monitor allocated, used, remaining budget, and cost per task</h1>
                            <p class="hero-text">Budget view helps detect burn rate, task cost, and where manager intervention is needed before overspending.</p>
                        </div>
                        <div id="budgetMetrics" class="hero-kpis"></div>
                    </div>
                </section>
                <section class="manager-panel">
                    <header><div><p class="eyebrow-line">Budget Rows</p><h2>Financial control by project</h2></div></header>
                    <div class="table-wrap">
                        <table class="manager-table">
                            <thead><tr><th>Project</th><th>Allocated</th><th>Used</th><th>Remaining</th><th>Cost / Task</th><th>Status</th></tr></thead>
                            <tbody id="budgetTable"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script src="../../../assets/js/api.js"></script>
    <script src="../../../assets/js/auth.js"></script>
    <script src="../../../assets/js/theme.js"></script>
    <script src="../../../assets/js/notifications.js"></script>
    <script src="../../../assets/js/enterprise-data.js"></script>
    <script src="../../../assets/js/role-workspace.js"></script>
    <script src="../manager-hub.js"></script>
    <script src="budget.js"></script>
</body>
</html>
