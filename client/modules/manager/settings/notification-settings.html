<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="../../../assets/images/logo.png" />
    <title>Manager Rewards</title>
    <link rel="stylesheet" href="../../../assets/css/global.css" />
    <link rel="stylesheet" href="../../../assets/css/role-workspace.css" />
    <link rel="stylesheet" href="../manager-workspace.css" />
</head>
<body>
    <div id="navbar"></div>
    <div class="workspace-layout">
        <div id="sidebar"></div>
        <main class="workspace-page">
            <div class="manager-shell">
                <section class="manager-hero">
                    <div class="manager-hero-grid">
                        <div>
                            <p class="eyebrow-line">Rewards</p>
                            <h1>Manage badges and recognition</h1>
                            <p class="hero-text">Track top performer, fast responder, perfect attendance, and collaboration badges from one recognition screen.</p>
                        </div>
                        <div id="rewardMetrics" class="hero-kpis"></div>
                    </div>
                </section>
                <section class="manager-grid-2">
                    <article class="manager-panel">
                        <header><div><p class="eyebrow-line">Award Badge</p><h2>Create reward</h2></div></header>
                        <form id="rewardForm" class="manager-form">
                            <div class="manager-form-grid two">
                                <div class="manager-field"><span>Member</span><select id="rewardMember"></select></div>
                                <div class="manager-field"><span>Badge</span><select id="rewardBadge"><option>Top Performer</option><option>Fast Responder</option><option>Perfect Attendance</option><option>Best Collaborator</option></select></div>
                            </div>
                            <div class="manager-field"><span>Reason</span><textarea id="rewardReason"></textarea></div>
                            <div class="manager-button-row"><button class="btn btn-primary" type="submit">Award Badge</button></div>
                        </form>
                    </article>
                    <article class="manager-panel">
                        <header><div><p class="eyebrow-line">Award History</p><h2>Recognition records</h2></div></header>
                        <div id="rewardList" class="manager-list"></div>
                    </article>
                </section>
            </div>
        </main>
    </div>
    <script src="../../../assets/js/api.js"></script>
    <script src="../../../assets/js/auth.js"></script>
    <script src="../../../assets/js/theme.js"></script>
    <script src="../../../assets/js/notifications.js"></script>
    <script src="../../../assets/js/enterprise-data.js"></script>
    <script src="../../../assets/js/role-workspace.js"></script>
    <script src="../manager-hub.js"></script>
    <script src="rewards.js"></script>
</body>
</html>
