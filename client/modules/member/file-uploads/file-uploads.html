<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Uploads</title>
  <link rel="stylesheet" href="../../../assets/css/global.css" />
  <link rel="stylesheet" href="../../../assets/css/role-workspace.css" />
  <link rel="stylesheet" href="file-uploads.css" />
</head>
<body>
  <div id="navbar"></div>
  <div class="workspace-layout">
    <div id="sidebar"></div>
    <main class="workspace-page">
      <section class="workspace-hero files-hero">
        <div class="hero-copy">
          <p class="eyebrow">Proof Uploads</p>
          <h1>Upload ZIPs, screenshots, PDFs and proof files linked to your subtask</h1>
          <p class="hero-text">Files are saved with metadata in MongoDB and linked back to the Team Lead review flow.</p>
        </div>
      </section>
      <section class="content-grid member-grid">
        <article class="workspace-panel">
          <div class="section-heading"><div><p class="eyebrow">Upload</p><h2>Attach work proof</h2></div></div>
          <form id="fileUploadForm" class="form-grid">
            <label class="field field-wide"><span>Project</span><select id="fileProjectId" required></select></label>
            <label class="field"><span>File</span><input id="proofFile" type="file" required /></label>
            <div class="btn-row field-wide"><button class="btn btn-primary" type="submit">Upload To OneDrive</button></div>
          </form>
        </article>
        <article class="workspace-panel">
          <div class="section-heading"><div><p class="eyebrow">Uploaded Files</p><h2>Saved proof history</h2></div></div>
          <div id="fileCards" class="stack-list"></div>
        </article>
      </section>
    </main>
  </div>
  <script src="../../../assets/js/api.js"></script>
  <script src="../../../assets/js/auth.js"></script>
  <script src="../../../assets/js/theme.js"></script>
  <script src="../../../assets/js/notifications.js"></script>
  <script src="../../../assets/js/role-workspace.js"></script>
  <script src="../member-workflow.js"></script>
  <script src="file-uploads.js"></script>
</body>
</html>
