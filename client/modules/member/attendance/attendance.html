<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Attendance</title>
  <link rel="stylesheet" href="../../../assets/css/global.css" />
  <link rel="stylesheet" href="../../../assets/css/role-workspace.css" />
  <link rel="stylesheet" href="attendance.css" />
</head>
<body>
  <div id="navbar"></div>
  <div class="workspace-layout">
    <div id="sidebar"></div>
    <main class="workspace-page">
      <section class="workspace-hero attendance-hero">
        <div class="hero-copy">
          <p class="eyebrow">Attendance Flow</p>
          <h1>Check in with selfie, location and device info, then check out with working hours</h1>
          <p class="hero-text">All attendance records are saved in MongoDB with today status and work hours.</p>
        </div>
      </section>
      <section class="content-grid member-grid">
        <article class="workspace-panel">
          <div class="section-heading"><div><p class="eyebrow">Today</p><h2>Check in / check out</h2></div></div>
          <form id="attendanceForm" class="form-grid">
            <label class="field"><span>Status</span><select id="attendanceStatus"><option>Present</option><option>Late</option><option>Half Day</option></select></label>
            <label class="field"><span>Selfie Photo</span><input id="attendanceSelfie" type="file" accept="image/*" /></label>
            <label class="field field-wide"><span>Location Label</span><input id="attendanceLocationLabel" type="text" placeholder="Fetching GPS or enter manually" /></label>
            <div class="btn-row field-wide">
              <button class="btn btn-primary" type="button" id="checkInBtn">Check In</button>
              <button class="btn ghost-btn" type="button" id="checkOutBtn">Check Out</button>
            </div>
          </form>
        </article>
        <article class="workspace-panel">
          <div class="section-heading"><div><p class="eyebrow">History</p><h2>Monthly attendance view</h2></div></div>
          <div id="attendanceCards" class="stack-list"></div>
        </article>
      </section>
    </main>
  </div>
  <script src="../../../assets/js/api.js"></script>
  <script src="../../../assets/js/auth.js"></script>
  <script src="../../../assets/js/theme.js"></script>
  <script src="../../../assets/js/notifications.js"></script>
  <script src="../../../assets/js/role-workspace.js"></script>
  <script src="../member-workflow.js"></script>
  <script src="attendance.js"></script>
</body>
</html>
