<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Updates</title>
  <link rel="stylesheet" href="../../../assets/css/global.css" />
  <link rel="stylesheet" href="../../../assets/css/role-workspace.css" />
  <link rel="stylesheet" href="daily-updates.css" />
</head>
<body>
  <div id="navbar"></div>
  <div class="workspace-layout">
    <div id="sidebar"></div>
    <main class="workspace-page">
      <section class="workspace-hero updates-hero">
        <div class="hero-copy">
          <p class="eyebrow">Daily Progress Updates</p>
          <h1>Send summary, hours, completion and blockers to your Team Lead</h1>
          <p class="hero-text">Daily updates are saved to MongoDB and visible to your Team Lead and Manager.</p>
        </div>
      </section>
      <section class="content-grid member-grid">
        <article class="workspace-panel">
          <div class="section-heading"><div><p class="eyebrow">Submit Update</p><h2>Today's work log</h2></div></div>
          <form id="dailyUpdateForm" class="form-grid">
            <label class="field field-wide"><span>Project Name</span><input id="updateProjectName" type="text" placeholder="Enter your project name" /></label>
            <label class="field field-wide"><span>Completed Work</span><textarea id="updateCompletedWork" rows="4" required placeholder="Write in your own words what you completed today"></textarea></label>
            <label class="field field-wide"><span>Pending Work</span><textarea id="updatePendingWork" rows="3" placeholder="What is still pending?"></textarea></label>
            <label class="field"><span>Hours Worked</span><input id="updateHours" type="number" min="0" step="0.5" required /></label>
            <label class="field"><span>Completion %</span><input id="updateCompletion" type="number" min="0" max="100" required /></label>
            <label class="field field-wide"><span>Blockers / Issues</span><textarea id="updateBlockers" rows="3"></textarea></label>
            <label class="field field-wide"><span>Notes / Client Feedback</span><textarea id="updateNotes" rows="3" placeholder="Extra notes, client feedback, links, etc."></textarea></label>
            <div class="btn-row field-wide"><button class="btn btn-primary" type="submit">Submit Daily Update</button></div>
          </form>
        </article>
        <article class="workspace-panel">
          <div class="section-heading"><div><p class="eyebrow">History</p><h2>Submitted updates</h2></div></div>
          <div id="updateCards" class="stack-list"></div>
        </article>
      </section>
    </main>
  </div>
  <script src="../../../assets/js/api.js"></script>
  <script src="../../../assets/js/auth.js"></script>
  <script src="../../../assets/js/theme.js"></script>
  <script src="../../../assets/js/notifications.js"></script>
  <script src="../../../assets/js/role-workspace.js"></script>
  <script src="../member-workflow.js"></script>
  <script src="daily-updates.js"></script>
</body>
</html>
