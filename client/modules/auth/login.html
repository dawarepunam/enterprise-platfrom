<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Smart Enterprise</title>
    <link rel="stylesheet" href="../../assets/css/variables.css" />
    <link rel="stylesheet" href="../../assets/css/global.css" />
    <link rel="stylesheet" href="../../assets/css/forms.css" />
    <link rel="stylesheet" href="login.css" />
</head>
<body>
    <div class="auth-page">
        <section class="auth-visual-panel">
            <div class="auth-brand">
                <span class="auth-brand-badge">JMKC</span>
                <small>CRM Admin Console</small>
            </div>
            <div class="auth-hero-copy">
                <h1>Admin Login</h1>
                <p>Welcome back, Admin. Sign in to manage users, departments, projects, reports, and security workflows.</p>
            </div>
            <div class="auth-visual-features">
                <span>Glassmorphism interface</span>
                <span>Secure enterprise access</span>
                <span>Audit log ready</span>
            </div>
        </section>
        <section class="auth-card auth-card-glass">
            <div class="auth-card-header">
                <div>
                    <p class="eyebrow">Secure access</p>
                    <h2>Admin Credentials</h2>
                </div>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="loginRole">Role</label>
                        <select id="loginRole" required>
                            <option value="ADMIN">Admin</option>
                            <option value="MANAGER">Manager</option>
                            <option value="HR">HR</option>
                            <option value="MEMBER">Employee</option>
                            <option value="CLIENT">Client</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="admin@jmkc.com" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" placeholder="Enter your password" required />
                </div>
                <div class="form-actions auth-actions">
                    <a class="text-link" href="forgot-password.html">Forgot Password?</a>
                    <button class="btn btn-primary" type="submit">Sign In</button>
                </div>
            </form>
        </section>
    </div>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/enterprise-data.js"></script>
    <script src="../../assets/js/auth.js"></script>
</body>
</html>
