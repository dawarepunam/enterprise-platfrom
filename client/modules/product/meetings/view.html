<div class="pm-meetings">
  <div class="pm-toolbar">
    <div>
      <span class="pm-eyebrow">Collaboration</span>
      <h2>Meeting Center</h2>
      <p style="color:var(--pm-text-muted); font-size: 0.875rem;">Log client and internal meetings related to this requirement.</p>
    </div>
    <div class="pm-actions">
      <button class="pm-btn primary" data-action="addMeeting">+ Log Meeting</button>
    </div>
  </div>

  <div class="pm-card">
    <div class="pm-table-wrapper">
      <table class="pm-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Date</th>
            <th>Agenda</th>
            <th>Attendees</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="meetingTableBody">
          <tr><td colspan="5" style="text-align: center;">Loading meetings...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
