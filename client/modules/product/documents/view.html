<div class="pm-documents">
  <div class="pm-toolbar">
    <div>
      <span class="pm-eyebrow">Knowledge</span>
      <h2>Document Center</h2>
      <p style="color:var(--pm-text-muted); font-size: 0.875rem;">Manage BRDs, Proposals, and other requirement artifacts.</p>
    </div>
    <div class="pm-actions">
      <button class="pm-btn primary" data-action="addDocument">+ Add Document</button>
    </div>
  </div>

  <div class="pm-card">
    <div class="pm-table-wrapper">
      <table class="pm-table">
        <thead>
          <tr>
            <th>Document Name</th>
            <th>Type</th>
            <th>Version</th>
            <th>Approval Status</th>
            <th>Uploaded</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="documentTableBody">
          <tr><td colspan="6" style="text-align: center;">Loading documents...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
