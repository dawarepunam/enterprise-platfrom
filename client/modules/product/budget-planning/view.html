<div class="pm-budget-planning" style="display:flex; flex-direction:column; gap:1.5rem; height:100%;">
  <div class="pm-toolbar" style="margin-bottom:0; display:flex; justify-content:space-between; align-items:center;">
    <div>
      <span class="pm-eyebrow" id="bpContext" style="cursor:pointer;" onclick="window.App.navigate('/product-manager/workspace')">← Back to Workspace</span>
      <h2>Budget Planning</h2>
    </div>
    <div class="pm-actions">
      <button class="pm-btn primary" data-action="addBudget" style="background:#4F46E5; color:white; border:none;">+ Add Budget</button>
    </div>
  </div>

  <div class="pm-grid" style="flex:1;">
    <div class="pm-col-12 pm-card" style="display:flex; flex-direction:column;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h3 style="font-size:1.125rem;">Budget Allocation</h3>
      </div>
      
      <div id="budgetListContainer" style="display:flex; flex-direction:column; gap:1rem; overflow-y:auto; flex:1; padding-right:0.5rem;">
        <div style="text-align:center; color:var(--pm-text-muted); padding:2rem;">Loading budget...</div>
      </div>

      <div style="margin-top:1.5rem; padding-top:1.5rem; border-top:1px solid var(--pm-border); display:flex; justify-content:space-between; align-items:center;">
        <h3 style="font-size:1.25rem;">Total Budget</h3>
        <h2 id="totalBudgetDisplay" style="font-size:2rem; color:var(--pm-primary);">₹0</h2>
      </div>
    </div>
  </div>
</div>
