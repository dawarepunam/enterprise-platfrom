<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports – Project Manager | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <style>
    .report-grid { display:grid; grid-template-columns:300px 1fr; gap:24px; }
    
    .report-sidebar { background:var(--pm-card); border:1px solid var(--pm-border); border-radius:var(--pm-radius); padding:20px; height:max-content; }
    
    .report-main { background:var(--pm-card); border:1px solid var(--pm-border); border-radius:var(--pm-radius); padding:0; display:flex; flex-direction:column; min-height:600px; }
    .report-preview-header { padding:20px; border-bottom:1px solid var(--pm-border); display:flex; justify-content:space-between; align-items:center; }
    .report-preview-body { padding:24px; flex:1; background:var(--pm-surface); display:flex; flex-direction:column; align-items:center; justify-content:center; }
    
    .export-btns { display:flex; gap:10px; }
    .export-btn { padding:8px 16px; border-radius:6px; font-size:12.5px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; border:1px solid transparent; transition:var(--pm-transition); }
    .export-pdf { background:#fee2e2; color:#dc2626; border-color:#fca5a5; }
    .export-pdf:hover { background:#fca5a5; color:#991b1b; }
    .export-excel { background:#dcfce7; color:#16a34a; border-color:#86efac; }
    .export-excel:hover { background:#86efac; color:#14532d; }
    .export-csv { background:#e0e7ff; color:#4f46e5; border-color:#a5b4fc; }
    .export-csv:hover { background:#a5b4fc; color:#312e81; }

    .radio-group { display:flex; flex-direction:column; gap:12px; margin-bottom:20px; }
    .radio-label { display:flex; align-items:center; gap:8px; font-size:13px; cursor:pointer; }
    .radio-label input[type="radio"] { accent-color:var(--pm-accent); width:16px; height:16px; cursor:pointer; }

    /* Mock Report Table */
    .mock-report { width:100%; max-width:800px; background:#fff; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06); border-radius:8px; padding:32px; font-family:serif; }
    .mock-header { text-align:center; border-bottom:2px solid #000; padding-bottom:16px; margin-bottom:24px; }
    .mock-title { font-size:24px; font-weight:bold; margin-bottom:8px; }
    .mock-meta { font-size:12px; color:#666; }
    .mock-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:16px; }
    .mock-table th, .mock-table td { border:1px solid #ddd; padding:10px; text-align:left; }
    .mock-table th { background:#f5f5f5; font-weight:bold; }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column">
    <div id="pm-header-root"></div>
    <main class="pm-main">
      <!-- PM Standard Back Button -->
      

      <div class="pm-page-header">
        <div>
          <div class="pm-breadcrumb"><i class="fa fa-home"></i><a href="/project-manager/dashboard">Dashboard</a><i class="fa fa-chevron-right"></i><span>Reports</span></div>
          <h1 class="pm-page-title" style="margin-top:4px">Generate Reports</h1>
        </div>
      </div>

      <div class="report-grid">
        <!-- Configuration Sidebar -->
        <div class="report-sidebar">
          <h3 style="font-size:15px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:8px;"><i class="fa fa-filter" style="color:var(--pm-accent)"></i> Report Configuration</h3>
          
          <div class="pm-form-group">
            <label class="pm-form-label">Report Type</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="reportType" value="PROJECT" checked onchange="updatePreview()"> Project Status Report</label>
              <label class="radio-label"><input type="radio" name="reportType" value="EMPLOYEE" onchange="updatePreview()"> Employee Performance</label>
              <label class="radio-label"><input type="radio" name="reportType" value="ATTENDANCE" onchange="updatePreview()"> Attendance & Leave</label>
              <label class="radio-label"><input type="radio" name="reportType" value="RISK" onchange="updatePreview()"> Risk Assessment</label>
            </div>
          </div>

          <div class="pm-form-group" id="projectSelectGroup">
            <label class="pm-form-label">Select Project</label>
            <select class="pm-form-input" id="reportProject">
              <option value="ALL">All Projects</option>
              <option value="CRM">CRM Development</option>
              <option value="ERP">ERP System</option>
              <option value="MOBILE">Mobile App</option>
            </select>
          </div>

          <div class="pm-form-group">
            <label class="pm-form-label">Date Range</label>
            <select class="pm-form-input" id="reportDateRange">
              <option value="THIS_MONTH">This Month</option>
              <option value="LAST_MONTH">Last Month</option>
              <option value="Q1">Q1 2026</option>
              <option value="Q2">Q2 2026</option>
              <option value="YEAR">Year to Date</option>
              <option value="CUSTOM">Custom Range...</option>
            </select>
          </div>

          <button class="pm-btn pm-btn-primary" style="width:100%; margin-top:16px;" onclick="generateReport()">
            <i class="fa fa-sync-alt"></i> Generate Preview
          </button>
        </div>

        <!-- Preview Area -->
        <div class="report-main">
          <div class="report-preview-header">
            <div style="font-weight:700; font-size:16px;">Report Preview</div>
            <div class="export-btns">
              <button class="export-btn export-pdf" onclick="pmToast('Exporting to PDF...', 'info')"><i class="fa fa-file-pdf"></i> PDF</button>
              <button class="export-btn export-excel" onclick="pmToast('Exporting to Excel...', 'info')"><i class="fa fa-file-excel"></i> Excel</button>
              <button class="export-btn export-csv" onclick="pmToast('Exporting to CSV...', 'info')"><i class="fa fa-file-csv"></i> CSV</button>
            </div>
          </div>
          
          <div class="report-preview-body" id="reportPreview">
            <!-- Default View -->
            <div style="text-align:center; color:var(--pm-text-muted);">
              <i class="fa fa-file-invoice" style="font-size:48px; opacity:0.5; margin-bottom:16px;"></i>
              <p>Click "Generate Preview" to view the report here.</p>
            </div>
          </div>
        </div>
      </div>
      <!-- PM Standard Footer -->
      

    </main>
  </div>
</div>

<div class="pm-toast-container" id="pmToastContainer"></div>

<script src="/assets/js/api.js"></script>
<script src="/modules/project-manager/pm-shell.js"></script>
<script>
  function updatePreview() {
    const type = document.querySelector('input[name="reportType"]:checked').value;
    const projGroup = document.getElementById('projectSelectGroup');
    if(type === 'EMPLOYEE' || type === 'ATTENDANCE') {
      projGroup.style.display = 'none';
    } else {
      projGroup.style.display = 'block';
    }
  }

  function generateReport() {
    const preview = document.getElementById('reportPreview');
    const type = document.querySelector('input[name="reportType"]:checked').value;
    const dateRange = document.getElementById('reportDateRange').options[document.getElementById('reportDateRange').selectedIndex].text;
    
    preview.innerHTML = '<div style="color:var(--pm-accent)"><i class="fa fa-spinner fa-spin fa-2x"></i></div>';
    
    setTimeout(() => {
      let title = '', thead = '', tbody = '';
      const now = new Date().toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});

      if(type === 'PROJECT') {
        title = 'Project Status Report';
        thead = '<tr><th>Project Name</th><th>Client</th><th>Status</th><th>Progress</th><th>Deadline</th></tr>';
        tbody = `
          <tr><td>CRM Development</td><td>ABC Corp</td><td>In Progress</td><td>75%</td><td>30 May 2026</td></tr>
          <tr><td>ERP System</td><td>XYZ Ltd</td><td>Pending</td><td>10%</td><td>15 Aug 2026</td></tr>
          <tr><td>Mobile App UI</td><td>PQR Inc</td><td>Completed</td><td>100%</td><td>01 May 2026</td></tr>
        `;
      } else if(type === 'EMPLOYEE') {
        title = 'Employee Performance Report';
        thead = '<tr><th>Employee Name</th><th>Department</th><th>Tasks Done</th><th>Performance</th><th>Attendance</th></tr>';
        tbody = `
          <tr><td>Rahul Sharma</td><td>Development</td><td>45</td><td>92%</td><td>98%</td></tr>
          <tr><td>Priya Singh</td><td>Design</td><td>32</td><td>88%</td><td>95%</td></tr>
          <tr><td>Amit Patel</td><td>Testing</td><td>50</td><td>95%</td><td>100%</td></tr>
        `;
      } else if(type === 'ATTENDANCE') {
        title = 'Attendance & Leave Report';
        thead = '<tr><th>Employee Name</th><th>Total Days</th><th>Present</th><th>Absent</th><th>Leaves</th></tr>';
        tbody = `
          <tr><td>Rahul Sharma</td><td>22</td><td>21</td><td>0</td><td>1 (Sick)</td></tr>
          <tr><td>Priya Singh</td><td>22</td><td>20</td><td>1</td><td>1 (Casual)</td></tr>
        `;
      } else if(type === 'RISK') {
        title = 'Risk Assessment Report';
        thead = '<tr><th>Project</th><th>Risk Title</th><th>Severity</th><th>Status</th><th>Mitigation</th></tr>';
        tbody = `
          <tr><td>CRM Development</td><td>API Delay from Client</td><td>High</td><td>Open</td><td>Follow up daily</td></tr>
          <tr><td>ERP System</td><td>Resource Shortage</td><td>Medium</td><td>Resolved</td><td>Hired contractor</td></tr>
        `;
      }

      preview.innerHTML = `
        <div class="mock-report">
          <div class="mock-header">
            <div class="mock-title">${title}</div>
            <div class="mock-meta">Generated on: ${now} | Period: ${dateRange} | Company: JMKC GRP</div>
          </div>
          <table class="mock-table">
            <thead>${thead}</thead>
            <tbody>${tbody}</tbody>
          </table>
          <div style="margin-top:40px; font-size:10px; color:#999; text-align:center;">
            *** End of Report ***
          </div>
        </div>
      `;
      pmToast('Preview generated successfully', 'success');
    }, 800);
  }
</script>
</body>
</html>
