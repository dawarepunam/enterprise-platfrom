<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Manager – Discussions</title>
  <link rel="stylesheet" href="/modules/project-manager/discussions/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <header class="app-header">
    <h1><i class="fa-solid fa-comments"></i> Discussions</h1>
    <button id="newDiscussionBtn" class="btn-primary"><i class="fa-solid fa-plus"></i> New Topic</button>
  </header>

  <main class="container">
    <section class="discussion-list" id="discussionList">
      <!-- Discussion threads injected by JS -->
    </section>
  </main>

  <!-- Discussion Modal -->
  <div id="discussionModal" class="modal hidden">
    <div class="modal-content glass">
      <span class="close" id="closeModal">&times;</span>
      <h2>Start a Discussion</h2>
      <form id="discussionForm">
        <label>Title<input type="text" name="title" required /></label>
        <label>Message<textarea name="content" rows="4" required></textarea></label>
        <label>Project ID (Optional)<input type="text" name="projectId" /></label>
        <label>Task ID (Optional)<input type="text" name="taskId" /></label>
        <button type="submit" class="btn-primary">Post</button>
      </form>
    </div>
  </div>

  <script>
    async function apiFetch(url, opts = {}) {
      const token = localStorage.getItem('jwt');
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(url, { ...opts, headers });
      return res.json();
    }

    async function loadDiscussions() {
      const { data: discussions } = await apiFetch('/api/discussions');
      const container = document.getElementById('discussionList');
      container.innerHTML = '';
      (discussions || []).forEach(d => {
        const div = document.createElement('div');
        div.className = 'discussion-thread glass';
        div.innerHTML = `
          <h3>${d.title}</h3>
          <p>${d.content}</p>
          <div class="meta">
            <span>Posted by ${d.author?.name || 'Unknown'}</span>
            <span class="badge ${d.status.toLowerCase()}">${d.status}</span>
            <span>${(d.replies || []).length} Replies</span>
          </div>
        `;
        container.appendChild(div);
      });
    }

    const modal = document.getElementById('discussionModal');
    document.getElementById('newDiscussionBtn').onclick = () => modal.classList.remove('hidden');
    document.getElementById('closeModal').onclick = () => modal.classList.add('hidden');
    window.onclick = e => { if (e.target === modal) modal.classList.add('hidden'); };

    document.getElementById('discussionForm').addEventListener('submit', async e => {
      e.preventDefault();
      const payload = Object.fromEntries(new FormData(e.target));
      await apiFetch('/api/discussions', { method: 'POST', body: JSON.stringify(payload) });
      modal.classList.add('hidden');
      e.target.reset();
      loadDiscussions();
    });

    document.addEventListener('DOMContentLoaded', loadDiscussions);
  </script>
</body>
</html>
