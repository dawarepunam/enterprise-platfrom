<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Chat – Project Manager | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <style>
    .chat-container { display:flex; height:calc(100vh - 180px); background:var(--pm-card); border:1px solid var(--pm-border); border-radius:var(--pm-radius); overflow:hidden; }
    
    /* Sidebar */
    .chat-sidebar { width:280px; border-right:1px solid var(--pm-border); background:var(--pm-bg); display:flex; flex-direction:column; }
    .chat-sidebar-header { padding:16px; border-bottom:1px solid var(--pm-border); display:flex; justify-content:space-between; align-items:center; }
    .channel-list { flex:1; overflow-y:auto; padding:12px; }
    .channel-group { font-size:11px; font-weight:700; color:var(--pm-text-muted); text-transform:uppercase; margin:16px 0 8px 8px; letter-spacing:0.5px; }
    .channel-item { padding:8px 12px; border-radius:var(--pm-radius-sm); cursor:pointer; font-size:13px; font-weight:500; display:flex; align-items:center; gap:8px; transition:var(--pm-transition); color:var(--pm-text); margin-bottom:4px; }
    .channel-item:hover { background:var(--pm-card); }
    .channel-item.active { background:var(--pm-accent); color:#fff; }
    .channel-item .badge { margin-left:auto; background:var(--red); color:#fff; font-size:10px; font-weight:700; padding:2px 6px; border-radius:99px; }

    /* Main Chat */
    .chat-main { flex:1; display:flex; flex-direction:column; background:var(--pm-surface); }
    .chat-header { padding:16px 24px; border-bottom:1px solid var(--pm-border); background:var(--pm-card); display:flex; justify-content:space-between; align-items:center; }
    .chat-title { font-size:16px; font-weight:700; display:flex; align-items:center; gap:8px; }
    .chat-desc { font-size:12px; color:var(--pm-text-muted); margin-top:2px; }
    .project-picker { border:1px solid var(--pm-border); border-radius:8px; padding:7px 10px; font-size:12.5px; background:var(--pm-card); color:var(--pm-text); margin-left:12px; }
    .chat-actions button { background:none; border:none; color:var(--pm-text-muted); font-size:16px; cursor:pointer; padding:6px; margin-left:8px; transition:var(--pm-transition); }
    .chat-actions button:hover { color:var(--pm-accent); }

    /* Messages */
    .chat-messages { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:20px; }
    .msg-date-sep { text-align:center; position:relative; margin:16px 0; }
    .msg-date-sep::before { content:''; position:absolute; left:0; top:50%; width:100%; height:1px; background:var(--pm-border); z-index:1; }
    .msg-date-sep span { background:var(--pm-surface); padding:0 12px; font-size:11px; font-weight:600; color:var(--pm-text-muted); position:relative; z-index:2; }
    
    .message { display:flex; gap:12px; max-width:85%; }
    .message.mine { flex-direction:row-reverse; align-self:flex-end; }
    .msg-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:800; flex-shrink:0; }
    .msg-content { display:flex; flex-direction:column; }
    .message.mine .msg-content { align-items:flex-end; }
    .msg-header { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; font-size:12px; }
    .message.mine .msg-header { flex-direction:row-reverse; }
    .msg-sender { font-weight:700; color:var(--pm-text); }
    .msg-time { color:var(--pm-text-muted); font-size:10px; }
    .msg-bubble { background:var(--pm-card); border:1px solid var(--pm-border); padding:10px 14px; border-radius:12px; border-top-left-radius:0; font-size:13.5px; line-height:1.5; color:var(--pm-text); box-shadow:0 1px 2px rgba(0,0,0,0.05); }
    .message.mine .msg-bubble { background:var(--pm-accent); color:#fff; border-color:var(--pm-accent); border-top-left-radius:12px; border-top-right-radius:0; }
    .msg-bubble img { max-width:100%; border-radius:8px; margin-top:8px; border:1px solid rgba(0,0,0,.1); }

    /* Input Area */
    .chat-input-area { padding:16px 24px; border-top:1px solid var(--pm-border); background:var(--pm-card); }
    .chat-input-wrapper { display:flex; align-items:flex-end; gap:10px; background:var(--pm-bg); border:1px solid var(--pm-border); border-radius:var(--pm-radius-sm); padding:8px 12px; transition:border-color .2s; }
    .chat-input-wrapper:focus-within { border-color:var(--pm-accent); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
    .chat-btn { background:none; border:none; color:var(--pm-text-muted); font-size:18px; cursor:pointer; padding:4px; transition:color .2s; }
    .chat-btn:hover { color:var(--pm-accent); }
    .chat-input { flex:1; border:none; background:transparent; resize:none; padding:8px 0; font-family:inherit; font-size:14px; color:var(--pm-text); outline:none; max-height:120px; overflow-y:auto; line-height:1.5; }
    .chat-send-btn { background:var(--pm-accent); color:#fff; border:none; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .2s; margin-bottom:2px; }
    .chat-send-btn:hover { transform:scale(1.05); background:var(--pm-accent-dark); }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column">
    <div id="pm-header-root"></div>
    <main class="pm-main">
      <!-- PM Standard Back Button -->
      

      <div class="pm-page-header">
        <div>
          <div class="pm-breadcrumb"><i class="fa fa-home"></i><a href="/project-manager/dashboard">Dashboard</a><i class="fa fa-chevron-right"></i><span>Chat</span></div>
          <h1 class="pm-page-title" style="margin-top:4px">Team Communication</h1>
        </div>
      </div>

      <div class="chat-container">
        <!-- Sidebar -->
        <div class="chat-sidebar">
          <div class="chat-sidebar-header">
            <h3 style="font-size:14px; font-weight:700;"><i class="fa fa-comments" style="color:var(--pm-accent); margin-right:6px"></i> Channels</h3>
            <button class="chat-btn" style="font-size:14px" title="New Channel" onclick="openModal('modal-create-channel')"><i class="fa fa-plus"></i></button>
          </div>
          <div class="channel-list" id="channelList">
            <div class="channel-group">Projects</div>
            <div style="padding:12px;color:var(--pm-text-muted);font-size:12px"><i class="fa fa-spinner fa-spin"></i> Loading projects...</div>
          </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-main">
          <div class="chat-header">
            <div>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="chat-title" id="chatTitle"><i class="fa fa-folder-open" style="color:var(--pm-text-muted)"></i> Project chat</div>
                <select class="project-picker" id="chatProjectSelect" onchange="selectProject(this.value)"></select>
              </div>
              <div class="chat-desc" id="chatDesc">Select a project to view its team conversation</div>
            </div>
            <div class="chat-actions">
              <button title="Search in channel"><i class="fa fa-search"></i></button>
              <button title="Pinned Messages"><i class="fa fa-thumbtack"></i></button>
              <button title="Channel Info"><i class="fa fa-info-circle"></i></button>
            </div>
          </div>

          <div class="chat-messages" id="chatMessages">
            <div class="msg-date-sep"><span>Today</span></div>
            <div style="text-align:center;color:var(--pm-text-muted);font-size:12px;margin-top:40px">Loading chat...</div>
          </div>

          <div class="chat-input-area">
            <div class="chat-input-wrapper">
              <button class="chat-btn" title="Add Attachment" onclick="document.getElementById('chatFileInput').click()"><i class="fa fa-paperclip"></i></button>
              <input type="file" id="chatFileInput" style="display:none" onchange="sendAttachment(event)" />
              <button class="chat-btn" title="Format"><i class="fa fa-font"></i></button>
              <button class="chat-btn" title="Emoji"><i class="fa fa-smile"></i></button>
              <textarea class="chat-input" id="chatInputMsg" placeholder="Message #general..." rows="1" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
              <button class="chat-send-btn" onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
            </div>
          </div>
        </div>
      </div>
      <!-- PM Standard Footer -->
      

    </main>
  </div>
</div>

<!-- Create Channel Modal -->
<div class="pm-modal-overlay" id="modal-create-channel">
  <div class="pm-modal" style="max-width:400px">
    <div class="pm-modal-header">
      <div class="pm-modal-title"><i class="fa fa-hashtag" style="color:var(--pm-accent)"></i> Create Channel</div>
      <div class="pm-modal-close" onclick="closeModal('modal-create-channel')"><i class="fa fa-times"></i></div>
    </div>
    <div class="pm-form-group">
      <label class="pm-form-label">Channel Name</label>
      <input type="text" class="pm-form-input" placeholder="e.g. bug-reports" />
    </div>
    <div class="pm-form-group">
      <label class="pm-form-label">Description</label>
      <input type="text" class="pm-form-input" placeholder="What's this channel about?" />
    </div>
    <div class="flex gap-8" style="justify-content:flex-end;margin-top:20px">
      <button class="pm-btn pm-btn-outline" onclick="closeModal('modal-create-channel')">Cancel</button>
      <button class="pm-btn pm-btn-primary" onclick="closeModal('modal-create-channel'); pmToast('Channel created', 'success')">Create</button>
    </div>
  </div>
</div>

<div class="pm-toast-container" id="pmToastContainer"></div>

<script src="/assets/js/api.js"></script>
<script src="/modules/project-manager/pm-shell.js"></script>
<script>
  let chatProjects = [];
  let activeProject = null;
  let activeTeam = [];
  const colors = ['#3b82f6','#22c55e','#f97316','#a855f7','#ef4444','#06b6d4'];
  const me = () => {
    try { return JSON.parse(localStorage.getItem('user') || localStorage.getItem('jmkc_user') || '{}'); }
    catch { return {}; }
  };
  const initials = name => String(name || 'U').split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
  const chatKey = projectId => `pm_chat_${projectId}`;
  const getMessages = projectId => {
    try { return JSON.parse(localStorage.getItem(chatKey(projectId)) || '[]'); }
    catch { return []; }
  };
  const saveMessages = (projectId, messages) => localStorage.setItem(chatKey(projectId), JSON.stringify(messages.slice(-200)));
  const escapeHtml = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));

  async function loadChatProjects() {
    try {
      const res = await apiFetch('/api/manager/projects?size=500');
      chatProjects = res.data || [];
      const select = document.getElementById('chatProjectSelect');
      select.innerHTML = chatProjects.length
        ? chatProjects.map(p => `<option value="${p._id}">${escapeHtml(p.projectName || p.name || 'Unnamed Project')}</option>`).join('')
        : '<option value="">No projects</option>';
      renderProjectChannels();
      const qsProject = new URLSearchParams(window.location.search).get('project');
      const first = qsProject || chatProjects[0]?._id || '';
      if (first) selectProject(first);
      else renderEmptyChat('No assigned projects found.');
    } catch(e) {
      renderEmptyChat('Unable to load project chat.');
    }
  }

  function renderProjectChannels() {
    const list = document.getElementById('channelList');
    list.innerHTML = '<div class="channel-group">Projects</div>' + (chatProjects.length
      ? chatProjects.map(p => `<div class="channel-item" data-project-id="${p._id}" onclick="selectProject('${p._id}')"><i class="fa fa-folder-open"></i> ${escapeHtml(p.projectName || p.name || 'Project')}</div>`).join('')
      : '<div style="padding:12px;color:var(--pm-text-muted);font-size:12px">No projects available</div>') +
      '<div class="channel-group" style="margin-top:24px">Team Members</div><div id="teamDmList"><div style="padding:8px 12px;color:var(--pm-text-muted);font-size:12px">Select a project</div></div>';
  }

  async function selectProject(projectId) {
    activeProject = chatProjects.find(p => String(p._id) === String(projectId)) || null;
    document.getElementById('chatProjectSelect').value = projectId;
    document.querySelectorAll('.channel-item[data-project-id]').forEach(item => item.classList.toggle('active', item.dataset.projectId === String(projectId)));
    if (!activeProject) return;
    document.getElementById('chatTitle').innerHTML = `<i class="fa fa-folder-open" style="color:var(--pm-text-muted)"></i> ${escapeHtml(activeProject.projectName || activeProject.name || 'Project')}`;
    document.getElementById('chatDesc').textContent = 'Project-wise team chat and shared updates';
    document.getElementById('chatInputMsg').placeholder = `Message ${activeProject.projectName || activeProject.name || 'project team'}...`;
    await loadProjectTeam(projectId);
    renderMessages();
  }
  window.selectProject = selectProject;

  async function loadProjectTeam(projectId) {
    const dm = document.getElementById('teamDmList');
    dm.innerHTML = '<div style="padding:8px 12px;color:var(--pm-text-muted);font-size:12px"><i class="fa fa-spinner fa-spin"></i> Loading team...</div>';
    try {
      const res = await apiFetch('/api/manager/projects/' + projectId);
      activeTeam = res.data?.teamMembers || [];
      dm.innerHTML = activeTeam.length
        ? activeTeam.map((m, i) => `<div class="channel-item" onclick="insertMentionByIndex(${i})"><div style="width:8px;height:8px;border-radius:50%;background:${(m.onlineStatus||'Online')==='Online'?'var(--green)':'var(--pm-text-muted)'}"></div>${escapeHtml(m.name || 'Member')} <span style="margin-left:auto;font-size:10px;color:inherit;opacity:.7">${escapeHtml(m.role || 'MEMBER')}</span></div>`).join('')
        : '<div style="padding:8px 12px;color:var(--pm-text-muted);font-size:12px">No team members assigned.</div>';
    } catch(e) {
      activeTeam = [];
      dm.innerHTML = '<div style="padding:8px 12px;color:var(--pm-text-muted);font-size:12px">Team unavailable.</div>';
    }
  }

  function insertMention(name) {
    const input = document.getElementById('chatInputMsg');
    input.value = `${input.value}${input.value ? ' ' : ''}@${name} `;
    input.focus();
  }
  window.insertMention = insertMention;
  window.insertMentionByIndex = index => insertMention(activeTeam[index]?.name || '');

  function renderEmptyChat(message) {
    document.getElementById('chatMessages').innerHTML = `<div class="msg-date-sep"><span>Today</span></div><div style="text-align:center;color:var(--pm-text-muted);font-size:12px;margin-top:40px">${escapeHtml(message)}</div>`;
  }

  function renderMessages() {
    if (!activeProject) return renderEmptyChat('Select a project to start.');
    let messages = getMessages(activeProject._id);
    if (!messages.length) {
      messages = [{
        sender: 'System',
        text: `Project chat started for ${activeProject.projectName || activeProject.name}. Team members added here will see project-wise updates.`,
        time: new Date().toISOString(),
        system: true,
      }];
      saveMessages(activeProject._id, messages);
    }
    const user = me();
    const container = document.getElementById('chatMessages');
    container.innerHTML = '<div class="msg-date-sep"><span>Today</span></div>' + messages.map((msg, i) => {
      const mine = String(msg.userId || '') === String(user._id || '') && !msg.system;
      const name = msg.sender || 'Team member';
      const time = new Date(msg.time || Date.now()).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
      const color = msg.system ? '#64748b' : colors[Math.abs(String(name).charCodeAt(0) || i) % colors.length];
      return `<div class="message ${mine ? 'mine' : ''}">
        <div class="msg-avatar" style="background:${mine?'var(--pm-accent)':color}">${msg.system ? '<i class="fa fa-info"></i>' : initials(name)}</div>
        <div class="msg-content">
          <div class="msg-header"><span class="msg-sender">${mine ? 'You' : escapeHtml(name)}</span><span class="msg-time">${time}</span></div>
          <div class="msg-bubble">${msg.fileUrl ? `<a href="${msg.fileUrl}" target="_blank" style="color:inherit;font-weight:700"><i class="fa fa-paperclip"></i> ${escapeHtml(msg.fileName || 'Attachment')}</a>${msg.text ? '<br>' : ''}` : ''}${escapeHtml(msg.text || '').replace(/\n/g, '<br>')}</div>
        </div>
      </div>`;
    }).join('');
    container.scrollTop = container.scrollHeight;
  }

  function sendMessage() {
    if (!activeProject) { pmToast('Select a project first', 'warning'); return; }
    const input = document.getElementById('chatInputMsg');
    const text = input.value.trim();
    if(!text) return;
    const user = me();
    const messages = getMessages(activeProject._id);
    messages.push({ userId:user._id, sender:user.name || 'Project Manager', text, time:new Date().toISOString() });
    saveMessages(activeProject._id, messages);
    input.value = '';
    input.style.height = 'auto';
    renderMessages();
  }
  window.sendMessage = sendMessage;

  async function sendAttachment(event) {
    if (!activeProject) { pmToast('Select a project first', 'warning'); return; }
    const file = event.target.files?.[0];
    if (!file) return;
    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('projectId', activeProject._id);
      fd.append('folder', 'Project Assets');
      fd.append('module', 'project-chat');
      const res = await API.upload('/files/upload', fd);
      const saved = res.data || {};
      const user = me();
      const messages = getMessages(activeProject._id);
      messages.push({ userId:user._id, sender:user.name || 'Project Manager', text:'Shared a file', fileName:saved.name || file.name, fileUrl:saved.url || '#', time:new Date().toISOString() });
      saveMessages(activeProject._id, messages);
      renderMessages();
      pmToast('Attachment shared with project team', 'success');
    } catch(e) {
      pmToast(e.message || 'Attachment upload failed', 'error');
    } finally {
      event.target.value = '';
    }
  }
  window.sendAttachment = sendAttachment;

  document.getElementById('chatInputMsg').addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  document.addEventListener('DOMContentLoaded', loadChatProjects);
</script>
</body>
</html>
