<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications – Project Manager | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin-layout.css" />
  <link rel="stylesheet" href="/modules/admin/_shared/admin.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <style>
    .notif-container { max-width: 820px; margin: 0 auto; }
    .notif-card {
      background: #fff;
      border: 1px solid #eef0f4;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 12px;
      display: flex;
      gap: 15px;
      align-items: flex-start;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .notif-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
    .notif-card.unread { border-left: 4px solid #3b82f6; background: rgba(59,130,246,0.03); }
    .notif-icon {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 16px;
    }
    .notif-content { flex: 1; min-width: 0; }
    .notif-title { font-weight: 600; font-size: 14.5px; color: #111827; margin-bottom: 4px; }
    .notif-message { font-size: 13px; color: #6b7280; margin-bottom: 8px; line-height: 1.45; }
    .notif-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .notif-time { font-size: 11.5px; color: #9ca3af; }
    .notif-badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 99px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .notif-btn {
      flex-shrink: 0;
      padding: 6px 12px; font-size: 12px; border-radius: 7px;
      border: 1px solid #e5e7eb; background: #f9fafb;
      cursor: pointer; color: #374151;
      transition: all 0.15s;
    }
    .notif-btn:hover { background: #e5e7eb; }
    .notif-empty {
      text-align: center; padding: 60px 20px;
      background: #fff; border-radius: 12px;
      border: 1px solid #eef0f4;
    }
    .notif-empty i { font-size: 48px; color: #d1d5db; display: block; margin-bottom: 16px; }
    .notif-empty h3 { font-size: 16px; color: #374151; margin-bottom: 8px; }
    .notif-empty p { color: #6b7280; font-size: 13px; }
    .notif-count-badge {
      background: #3b82f6; color: #fff;
      font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
      margin-left: 8px; vertical-align: middle;
    }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tab {
      padding: 6px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1px solid #e5e7eb; background: #fff;
      color: #6b7280; transition: all 0.15s;
    }
    .filter-tab.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .filter-tab:hover:not(.active) { background: #f1f5f9; }
    .mark-all-btn {
      padding: 8px 16px; border-radius: 8px;
      background: #fff; border: 1px solid #e5e7eb;
      font-size: 13px; font-weight: 500;
      cursor: pointer; color: #374151;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.15s;
    }
    .mark-all-btn:hover { background: #f1f5f9; }
    .loading-state { text-align: center; padding: 60px 20px; color: #6b7280; font-size: 14px; }
    .loading-state i { font-size: 32px; color: #3b82f6; display: block; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
    <div id="pm-header-root"></div>
    <main class="pm-main">
      <!-- PM Standard Back Button -->
      

      <div class="pm-page-header">
        <div>
          <h1 class="pm-page-title">
            <i class="fa fa-bell" style="color:#3b82f6;margin-right:8px;"></i>
            All Notifications
            <span class="notif-count-badge" id="unreadCountBadge" style="display:none;"></span>
          </h1>
          <p class="pm-page-subtitle">Your real-time alerts from projects, tasks, meetings, and more.</p>
        </div>
        <button class="mark-all-btn" onclick="markAllReadPage()">
          <i class="fa fa-check-double"></i> Mark All as Read
        </button>
      </div>

      <div class="notif-container">
        <div class="filter-tabs">
          <div class="filter-tab active" onclick="setFilter('all', this)">All</div>
          <div class="filter-tab" onclick="setFilter('unread', this)">Unread</div>
          <div class="filter-tab" onclick="setFilter('task', this)">Tasks</div>
          <div class="filter-tab" onclick="setFilter('project', this)">Projects</div>
          <div class="filter-tab" onclick="setFilter('meeting', this)">Meetings</div>
        </div>

        <div id="notificationsList">
          <div class="loading-state">
            <i class="fa fa-spinner fa-spin"></i>
            <p>Loading notifications...</p>
          </div>
        </div>
      </div>
      <!-- PM Standard Footer -->
      

    </main>
  </div>
</div>

<script src="/modules/project-manager/pm-shell.js"></script>
<script>
  let allNotifications = [];
  let currentFilter = 'all';

  const iconMap = {
    task:         { icon: 'fa-tasks',                bg: '#dbeafe', color: '#2563eb' },
    project:      { icon: 'fa-folder-open',          bg: '#dcfce7', color: '#16a34a' },
    meeting:      { icon: 'fa-video',                bg: '#f3e8ff', color: '#7e22ce' },
    risk:         { icon: 'fa-exclamation-triangle', bg: '#fee2e2', color: '#dc2626' },
    daily_update: { icon: 'fa-clipboard-list',       bg: '#fef9c3', color: '#a16207' },
    info:         { icon: 'fa-info-circle',          bg: '#e0f2fe', color: '#0284c7' },
    default:      { icon: 'fa-bell',                 bg: '#f1f5f9', color: '#64748b' },
  };

  function getToken() {
    return localStorage.getItem('token') || localStorage.getItem('jmkc_token') || '';
  }

  async function fetchNotifications() {
    try {
      const token = getToken();
      const res = await fetch('/api/notifications?size=100', {
        headers: { Authorization: 'Bearer ' + token }
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      return json.data || [];
    } catch (err) {
      console.error('Notification fetch error:', err);
      return null;
    }
  }

  function renderNotifications(list) {
    const container = document.getElementById('notificationsList');
    if (!container) return;

    if (list === null) {
      container.innerHTML = `
        <div class="notif-empty">
          <i class="fa fa-wifi" style="color:#ef4444;"></i>
          <h3>Unable to load notifications</h3>
          <p>Check your connection or try refreshing the page.</p>
        </div>`;
      return;
    }

    // Apply filter
    let filtered = list;
    if (currentFilter === 'unread') {
      filtered = list.filter(n => !n.read);
    } else if (currentFilter !== 'all') {
      filtered = list.filter(n => (n.type || '').toLowerCase().includes(currentFilter));
    }

    // Update unread badge
    const unread = list.filter(n => !n.read).length;
    const badge = document.getElementById('unreadCountBadge');
    if (badge) {
      if (unread > 0) { badge.textContent = unread; badge.style.display = 'inline'; }
      else badge.style.display = 'none';
    }

    if (!filtered.length) {
      container.innerHTML = `
        <div class="notif-empty">
          <i class="fa fa-bell-slash"></i>
          <h3>${currentFilter === 'unread' ? "You're all caught up!" : 'No notifications found'}</h3>
          <p>${currentFilter === 'unread' ? 'No unread notifications at the moment.' : 'Try a different filter.'}</p>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(n => {
      const typeKey = (n.type || 'default').toLowerCase().replace(/\s+/g, '_');
      const style = iconMap[typeKey] || iconMap.default;
      const time = n.createdAt
        ? new Date(n.createdAt).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })
        : 'Recently';
      const isUnread = !n.read;

      return `
        <div class="notif-card ${isUnread ? 'unread' : ''}" id="notif-${n._id}">
          <div class="notif-icon" style="background:${style.bg};color:${style.color};">
            <i class="fa ${style.icon}"></i>
          </div>
          <div class="notif-content">
            <div class="notif-title">${n.title || 'Notification'}</div>
            ${n.message ? '<div class="notif-message">' + n.message + '</div>' : ''}
            <div class="notif-meta">
              <span class="notif-time"><i class="fa fa-clock" style="margin-right:4px;opacity:.6;"></i>${time}</span>
              ${n.type ? '<span class="notif-badge" style="background:' + style.bg + ';color:' + style.color + ';">' + n.type + '</span>' : ''}
              ${n.priority ? '<span class="notif-badge" style="background:#fef9c3;color:#a16207;">' + n.priority + '</span>' : ''}
            </div>
          </div>
          ${isUnread ? '<button class="notif-btn" onclick="markRead(\'' + n._id + '\')"><i class="fa fa-check" style="margin-right:4px;"></i>Read</button>' : '<span style="font-size:11px;color:#22c55e;flex-shrink:0;"><i class="fa fa-check-circle"></i></span>'}
        </div>`;
    }).join('');
  }

  async function loadPage() {
    document.getElementById('notificationsList').innerHTML = `
      <div class="loading-state">
        <i class="fa fa-spinner fa-spin"></i>
        <p>Loading...</p>
      </div>`;
    allNotifications = await fetchNotifications();
    renderNotifications(allNotifications);
  }

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderNotifications(allNotifications);
  }

  async function markRead(id) {
    try {
      const token = getToken();
      await fetch('/api/notifications/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ read: true })
      });
      const notif = allNotifications.find(n => n._id === id);
      if (notif) notif.read = true;
      renderNotifications(allNotifications);
      if (window.pmShell && window.pmShell.loadNotifications) window.pmShell.loadNotifications();
      if (window.pmToast) window.pmToast('Marked as read', 'success');
    } catch(e) {
      if (window.pmToast) window.pmToast('Failed to mark read', 'error');
    }
  }

  window.markAllReadPage = async function() {
    try {
      const token = getToken();
      await fetch('/api/notifications/mark-all-read', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token }
      });
      allNotifications.forEach(n => n.read = true);
      renderNotifications(allNotifications);
      if (window.pmShell && window.pmShell.loadNotifications) window.pmShell.loadNotifications();
      if (window.pmToast) window.pmToast('All marked as read', 'success');
    } catch(e) {
      if (window.pmToast) window.pmToast('Failed', 'error');
    }
  };

  // Load after shell sets up auth
  window.addEventListener('load', () => setTimeout(loadPage, 500));

  // Real-time: reload on new notification via socket
  const sockScript = document.createElement('script');
  sockScript.src = '/socket.io/socket.io.js';
  sockScript.onload = () => {
    try {
      const token = getToken();
      if (!token) return;
      const sock = io({ auth: { token } });
      sock.on('notification', () => loadPage());
    } catch(e) {}
  };
  document.head.appendChild(sockScript);
</script>
</body>
</html>
