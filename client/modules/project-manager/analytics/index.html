<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics – Project Manager | JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/modules/project-manager/pm-layout.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .analytics-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; }
    .chart-container { position:relative; height:300px; width:100%; }
    .chart-container-sm { position:relative; height:240px; width:100%; }
    .pm-card-header { border-bottom:1px solid var(--pm-border); padding-bottom:12px; margin-bottom:16px; }
  </style>
</head>
<body>
<div class="pm-shell">
  <div id="pm-sidebar-root"></div>
  <div style="flex:1;display:flex;flex-direction:column">
    <div id="pm-header-root"></div>
    <main class="pm-main">
      <!-- PM Standard Back Button -->
      

      <div class="pm-page-header">
        <div>
          <div class="pm-breadcrumb"><i class="fa fa-home"></i><a href="/project-manager/dashboard">Dashboard</a><i class="fa fa-chevron-right"></i><span>Analytics</span></div>
          <h1 class="pm-page-title" style="margin-top:4px">Data Analytics & Insights</h1>
        </div>
        <div class="flex gap-8">
          <select class="pm-form-input" style="padding:6px 12px; height:auto;" id="timeFilter" onchange="updateCharts()">
            <option value="7">Last 7 Days</option>
            <option value="30" selected>Last 30 Days</option>
            <option value="90">Last Quarter</option>
            <option value="365">This Year</option>
          </select>
          <button class="pm-btn pm-btn-outline pm-btn-sm" onclick="pmToast('Data refreshed!', 'success')"><i class="fa fa-sync-alt"></i> Refresh Data</button>
        </div>
      </div>

      <!-- KPI Summary -->
      <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:24px;">
        <div class="pm-card" style="display:flex; align-items:center; gap:16px; padding:20px;">
          <div style="width:48px;height:48px;border-radius:12px;background:#dbeafe;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px"><i class="fa fa-chart-line"></i></div>
          <div><div style="font-size:24px;font-weight:800">84%</div><div style="font-size:12px;color:var(--pm-text-muted)">Avg Project Progress</div></div>
        </div>
        <div class="pm-card" style="display:flex; align-items:center; gap:16px; padding:20px;">
          <div style="width:48px;height:48px;border-radius:12px;background:#dcfce7;color:var(--green);display:flex;align-items:center;justify-content:center;font-size:20px"><i class="fa fa-check-double"></i></div>
          <div><div style="font-size:24px;font-weight:800">142</div><div style="font-size:12px;color:var(--pm-text-muted)">Tasks Completed</div></div>
        </div>
        <div class="pm-card" style="display:flex; align-items:center; gap:16px; padding:20px;">
          <div style="width:48px;height:48px;border-radius:12px;background:#fef3c7;color:var(--orange);display:flex;align-items:center;justify-content:center;font-size:20px"><i class="fa fa-tachometer-alt"></i></div>
          <div><div style="font-size:24px;font-weight:800">92%</div><div style="font-size:12px;color:var(--pm-text-muted)">Employee Productivity</div></div>
        </div>
        <div class="pm-card" style="display:flex; align-items:center; gap:16px; padding:20px;">
          <div style="width:48px;height:48px;border-radius:12px;background:#fee2e2;color:var(--red);display:flex;align-items:center;justify-content:center;font-size:20px"><i class="fa fa-heartbeat"></i></div>
          <div><div style="font-size:24px;font-weight:800">96%</div><div style="font-size:12px;color:var(--pm-text-muted)">Overall Health Score</div></div>
        </div>
      </div>

      <!-- Charts -->
      <div class="analytics-grid">
        <!-- Project Progress (Line) -->
        <div class="pm-card">
          <div class="pm-card-header"><div class="pm-card-title"><i class="fa fa-chart-area" style="color:var(--blue);margin-right:6px"></i>Project Progress Over Time</div></div>
          <div class="chart-container"><canvas id="chartProjectProgress"></canvas></div>
        </div>

        <!-- Task Completion (Doughnut) -->
        <div class="pm-card">
          <div class="pm-card-header"><div class="pm-card-title"><i class="fa fa-chart-pie" style="color:var(--pm-accent);margin-right:6px"></i>Task Status Distribution</div></div>
          <div class="chart-container"><canvas id="chartTaskStatus"></canvas></div>
        </div>

        <!-- Employee Productivity (Bar) -->
        <div class="pm-card">
          <div class="pm-card-header"><div class="pm-card-title"><i class="fa fa-chart-bar" style="color:var(--green);margin-right:6px"></i>Department Productivity</div></div>
          <div class="chart-container"><canvas id="chartProductivity"></canvas></div>
        </div>

        <!-- Attendance Trend (Line) -->
        <div class="pm-card">
          <div class="pm-card-header"><div class="pm-card-title"><i class="fa fa-user-check" style="color:var(--orange);margin-right:6px"></i>Attendance Trend</div></div>
          <div class="chart-container"><canvas id="chartAttendance"></canvas></div>
        </div>
      </div>

      

    </main>
  </div>
</div>

<div class="pm-modal-overlay" id="modal-logout">
  <div class="pm-modal" style="max-width:360px;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">⚠️</div>
    <h3 style="font-size:16px;font-weight:700;margin-bottom:8px">Confirm Logout</h3>
    <div class="flex gap-8" style="justify-content:center;margin-top:16px">
      <button class="pm-btn pm-btn-outline" onclick="closeModal('modal-logout')">Cancel</button>
      <button class="pm-btn pm-btn-primary" style="background:var(--red)" onclick="performLogout()"><i class="fa fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>
</div>

<div class="pm-toast-container" id="pmToastContainer"></div>

<script src="/assets/js/api.js"></script>
<script src="/modules/project-manager/pm-shell.js"></script>
<script>
  let charts = {};

  function initCharts() {
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.color = '#64748b';
    
    const colors = {
      primary: '#2563eb', green: '#16a34a', orange: '#f59e0b', red: '#dc2626', purple: '#7c3aed',
      grid: 'rgba(0,0,0,0.05)'
    };

    // 1. Project Progress Line Chart
    const ctx1 = document.getElementById('chartProjectProgress').getContext('2d');
    const grad1 = ctx1.createLinearGradient(0, 0, 0, 300);
    grad1.addColorStop(0, 'rgba(37,99,235,0.2)');
    grad1.addColorStop(1, 'rgba(37,99,235,0)');
    
    charts.progress = new Chart(ctx1, {
      type: 'line',
      data: {
        labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5'],
        datasets: [{
          label: 'Avg Progress %',
          data: [20, 35, 55, 70, 84],
          borderColor: colors.primary, backgroundColor: grad1, borderWidth: 3,
          fill: true, tension: 0.4, pointBackgroundColor: '#fff', pointBorderColor: colors.primary, pointRadius: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, max: 100, grid: { color: colors.grid } },
          x: { grid: { display: false } }
        }
      }
    });

    // 2. Task Status Doughnut
    const ctx2 = document.getElementById('chartTaskStatus').getContext('2d');
    charts.tasks = new Chart(ctx2, {
      type: 'doughnut',
      data: {
        labels: ['Completed', 'In Progress', 'Pending', 'Delayed'],
        datasets: [{
          data: [65, 20, 10, 5],
          backgroundColor: [colors.green, colors.primary, colors.orange, colors.red],
          borderWidth: 0, hoverOffset: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '75%',
        plugins: {
          legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8 } }
        }
      }
    });

    // 3. Department Productivity Bar Chart
    const ctx3 = document.getElementById('chartProductivity').getContext('2d');
    charts.productivity = new Chart(ctx3, {
      type: 'bar',
      data: {
        labels: ['Development', 'Design', 'Testing', 'Marketing', 'HR'],
        datasets: [{
          label: 'Productivity Score',
          data: [94, 88, 91, 85, 90],
          backgroundColor: colors.purple, borderRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, max: 100, grid: { color: colors.grid } },
          x: { grid: { display: false } }
        }
      }
    });

    // 4. Attendance Trend Line Chart
    const ctx4 = document.getElementById('chartAttendance').getContext('2d');
    charts.attendance = new Chart(ctx4, {
      type: 'line',
      data: {
        labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
        datasets: [{
          label: 'Attendance %',
          data: [98, 96, 99, 95, 92],
          borderColor: colors.orange, backgroundColor: 'rgba(245,158,11,0.1)', borderWidth: 3,
          fill: true, tension: 0.3, pointBackgroundColor: '#fff', pointBorderColor: colors.orange, pointRadius: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: false, min: 80, max: 100, grid: { color: colors.grid } },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function updateCharts() {
    pmToast('Simulating data update...', 'info');
    // Randomize data slightly to simulate update
    charts.progress.data.datasets[0].data = [20, 35, 50 + Math.random()*10, 70, 80 + Math.random()*15];
    charts.progress.update();
    
    charts.tasks.data.datasets[0].data = [60+Math.random()*10, 15+Math.random()*10, 10, Math.random()*5];
    charts.tasks.update();
  }

  document.addEventListener('DOMContentLoaded', initCharts);
</script>
</body>
</html>
