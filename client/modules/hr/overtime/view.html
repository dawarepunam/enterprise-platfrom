<div class="hr-overtime-view" style="display:flex; flex-direction:column; gap:1.5rem; height:100%;">

  </div>

  <!-- KPI Cards Grid -->
  <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:1.5rem;">
    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #F59E0B;">
      <div style="color:var(--hr-text-muted); font-size:0.875rem;">Pending</div>

    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #10B981;">

    </div>
    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #3B82F6;">
      <div style="color:var(--hr-text-muted); font-size:0.875rem;">Paid</div>
      <div style="font-size:2rem; font-weight:700; color:#3B82F6;">24</div>
    </div>
  </div>

  <div class="hr-card" style="flex:1; overflow-y:auto;">

          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500; text-align:right;">Actions</th>
        </tr>
      </thead>
      <tbody id="hrOvertimeTableBody">
        <!-- Injected via script -->
      </tbody>
    </table>
  </div>

</div>
