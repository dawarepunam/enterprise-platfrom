<div class="hr-documents-view" style="display:flex; flex-direction:column; gap:1.5rem; height:100%;">
  
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">Documents</h2>
    <div style="display:flex; gap:1rem;">
      <button class="primary-btn">+ Upload Document</button>
    </div>
  </div>

  <!-- Top Cards -->
  <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:1.5rem;">
    <div class="hr-card" style="display:flex; align-items:center; gap:1rem;">
      <div style="font-size:2rem;">⏳</div>
      <div>
        <div style="color:var(--hr-text-muted); font-size:0.875rem;">Pending</div>
        <div style="font-size:1.5rem; font-weight:700;">28</div>
      </div>
    </div>
    <div class="hr-card" style="display:flex; align-items:center; gap:1rem;">
      <div style="font-size:2rem;">✅</div>
      <div>
        <div style="color:var(--hr-text-muted); font-size:0.875rem;">Verified</div>
        <div style="font-size:1.5rem; font-weight:700; color:#10B981;">145</div>
      </div>
    </div>
    <div class="hr-card" style="display:flex; align-items:center; gap:1rem;">
      <div style="font-size:2rem;">❌</div>
      <div>
        <div style="color:var(--hr-text-muted); font-size:0.875rem;">Rejected</div>
        <div style="font-size:1.5rem; font-weight:700; color:#EF4444;">3</div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="hr-card" style="display:flex; gap:1rem; padding:1rem;">
    <input type="text" placeholder="Search by Employee..." style="flex:1; padding:0.5rem; border:1px solid var(--hr-border); border-radius:6px;" />
    <select style="padding:0.5rem; border:1px solid var(--hr-border); border-radius:6px; min-width:150px;">
      <option value="">Document Type</option>
      <option value="aadhar">Aadhar</option>
      <option value="pan">PAN</option>
      <option value="offer">Offer Letter</option>
      <option value="degree">Degree</option>
    </select>
    <select style="padding:0.5rem; border:1px solid var(--hr-border); border-radius:6px; min-width:150px;">
      <option value="">Status</option>
      <option value="pending">Pending</option>
      <option value="verified">Verified</option>
      <option value="rejected">Rejected</option>
    </select>
  </div>

  <!-- Grid Cards -->
  <div id="hrDocumentsGrid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:1.5rem; flex:1; overflow-y:auto; padding-bottom:1rem;">
    <!-- Loading skeleton -->
    <div class="hr-skeleton" style="height:160px; border-radius:var(--hr-radius);"></div>
    <div class="hr-skeleton" style="height:160px; border-radius:var(--hr-radius);"></div>
    <div class="hr-skeleton" style="height:160px; border-radius:var(--hr-radius);"></div>
    <div class="hr-skeleton" style="height:160px; border-radius:var(--hr-radius);"></div>
  </div>

</div>

<!-- Document Preview Modal -->
<div id="hrDocPreviewModal" class="hr-modal-overlay hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.8); z-index:2000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
  <div class="hr-card" style="width:800px; height:80vh; display:flex; flex-direction:column; padding:0; overflow:hidden;">
    <div style="padding:1rem 1.5rem; border-bottom:1px solid var(--hr-border); display:flex; justify-content:space-between; align-items:center; background:#1E293B; color:white;">
      <h3 id="previewDocTitle" style="margin:0;">Document Preview</h3>
      <div style="display:flex; gap:1rem;">
        <button style="background:transparent; border:none; color:white; font-size:1.2rem; cursor:pointer;" onclick="window.UI.closeDocPreview()">✕</button>
      </div>
    </div>
    <div style="flex:1; background:#334155; display:flex; justify-content:center; align-items:center; color:white;">
      <!-- Mock PDF Viewer -->
      <div style="text-align:center;">
        <div style="font-size:4rem; margin-bottom:1rem;">📄</div>
        <div>PDF Viewer Mock</div>
        <div style="color:#94A3B8; font-size:0.875rem; margin-top:0.5rem;">Aadhar_Card_Rahul.pdf</div>
      </div>
    </div>
    <div style="padding:1rem 1.5rem; background:#F8FAFC; display:flex; justify-content:space-between;">
      <button class="hr-icon-btn" style="border:1px solid var(--hr-border); background:white; padding:0.5rem 1rem; border-radius:8px;">📥 Download</button>
      <div style="display:flex; gap:1rem;">
        <button class="hr-icon-btn" style="border:1px solid #EF4444; color:#EF4444; background:white; padding:0.5rem 1rem; border-radius:8px;">Reject</button>
        <button class="primary-btn" style="background:#10B981;" onclick="window.UI.verifyDocument()">Verify Document</button>
      </div>
    </div>
  </div>
</div>

<script src="/modules/hr/documents/script.js"></script>
