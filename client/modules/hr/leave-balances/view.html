<div class="hr-leave-balances-view" style="display:flex; flex-direction:column; gap:1.5rem; height:100%;">
  
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">Leave Balances</h2>
    <div style="display:flex; gap:1rem;">
      <button class="primary-btn" onclick="window.UI.toast('Exporting...', 'info')">Export Report</button>
    </div>
  </div>

  <!-- KPI Cards Grid -->
  <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:1.5rem;">
    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #3B82F6;">
      <div style="color:var(--hr-text-muted); font-size:0.875rem;">Casual Leave (Avg Remaining)</div>
      <div style="font-size:1.5rem; font-weight:700; color:#3B82F6;">8 Days</div>
    </div>
    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #10B981;">
      <div style="color:var(--hr-text-muted); font-size:0.875rem;">Sick Leave (Avg Remaining)</div>
      <div style="font-size:1.5rem; font-weight:700; color:#10B981;">5 Days</div>
    </div>
    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #8B5CF6;">
      <div style="color:var(--hr-text-muted); font-size:0.875rem;">Paid Leave (Avg Remaining)</div>
      <div style="font-size:1.5rem; font-weight:700; color:#8B5CF6;">12 Days</div>
    </div>
    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #F59E0B;">
      <div style="color:var(--hr-text-muted); font-size:0.875rem;">Comp-Off (Active)</div>
      <div style="font-size:1.5rem; font-weight:700; color:#F59E0B;">24</div>
    </div>
  </div>

  <div class="hr-card" style="display:flex; justify-content:space-between; align-items:center; padding:1rem;">
    <input type="text" placeholder="Search employee..." style="padding:0.5rem; border:1px solid var(--hr-border); border-radius:6px; width:250px;" />
    <select style="padding:0.5rem; border:1px solid var(--hr-border); border-radius:6px;">
      <option value="">Leave Type Filter</option>
      <option>Casual Leave</option>
      <option>Sick Leave</option>
      <option>Paid Leave</option>
    </select>
  </div>

  <!-- Table -->
  <div class="hr-card" style="flex:1; overflow-y:auto;">
    <table style="width:100%; border-collapse:collapse; text-align:left;">
      <thead>
        <tr style="border-bottom:1px solid var(--hr-border);">
          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500;">Employee</th>
          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500;">Leave Type</th>
          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500;">Used</th>
          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500;">Remaining</th>
          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500;">Carry Forward</th>
          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500;">Actions</th>
        </tr>
      </thead>
      <tbody id="hrLBTableBody">
        <!-- Injected via script -->
      </tbody>
    </table>
  </div>

</div>

<!-- Adjust Balance Popup -->
<div id="hrAdjustBalanceModal" class="hr-modal-overlay hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.6); z-index:2000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
  <div class="hr-card" style="width:400px; display:flex; flex-direction:column; padding:0; overflow:hidden;">
    <div style="padding:1.5rem; border-bottom:1px solid var(--hr-border); display:flex; justify-content:space-between; align-items:center;">
      <h3 style="margin:0;">Adjust Balance</h3>
      <button onclick="window.UI.closeAdjustBalanceModal()" style="background:transparent; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
    </div>
    <div style="padding:1.5rem;">
      <div style="font-weight:500; margin-bottom:1rem;" id="adjEmpName">Rahul Sharma</div>
      
      <label style="display:block; font-size:0.875rem; font-weight:500; margin-bottom:0.5rem;">Leave Type</label>
      <input type="text" id="adjType" readonly value="Casual Leave" style="width:100%; padding:0.75rem; border:1px solid var(--hr-border); border-radius:8px; background:#F1F5F9; margin-bottom:1rem;" />
      
      <label style="display:block; font-size:0.875rem; font-weight:500; margin-bottom:0.5rem;">Adjustment (+/- Days)</label>
      <input type="number" placeholder="e.g. 1 or -1" style="width:100%; padding:0.75rem; border:1px solid var(--hr-border); border-radius:8px; margin-bottom:1rem;" />

      <label style="display:block; font-size:0.875rem; font-weight:500; margin-bottom:0.5rem;">Remarks</label>
      <textarea rows="2" style="width:100%; padding:0.75rem; border:1px solid var(--hr-border); border-radius:8px; resize:none;"></textarea>
    </div>
    <div style="padding:1.5rem; border-top:1px solid var(--hr-border); display:flex; justify-content:flex-end; gap:1rem; background:#F8FAFC;">
      <button onclick="window.UI.closeAdjustBalanceModal()" style="background:white; border:1px solid var(--hr-border); border-radius:8px; padding:0.5rem 1rem; cursor:pointer;">Cancel</button>
      <button onclick="window.UI.submitAdjustBalance()" class="primary-btn" style="padding:0.5rem 1rem;">Save</button>
    </div>
  </div>
</div>

<script src="/modules/hr/leave-balances/script.js"></script>
