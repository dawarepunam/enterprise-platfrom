<div class="hr-compoff-view" style="display:flex; flex-direction:column; gap:1.5rem; height:100%;">
  
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">Comp-Off Management</h2>
    <button class="primary-btn" onclick="window.UI.openAssignCompOffModal()">Assign Comp-Off</button>
  </div>

  <!-- KPI Cards Grid -->
  <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:1.5rem;">
    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #F59E0B;">
      <div style="color:var(--hr-text-muted); font-size:0.875rem;">Available Balances</div>
      <div style="font-size:2rem; font-weight:700; color:#F59E0B;">12</div>
    </div>
    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #10B981;">
      <div style="color:var(--hr-text-muted); font-size:0.875rem;">Used</div>
      <div style="font-size:2rem; font-weight:700; color:#10B981;">18</div>
    </div>
    <div class="hr-card hoverable" style="cursor:pointer; padding:1.5rem; border-bottom:4px solid #EF4444;">
      <div style="color:var(--hr-text-muted); font-size:0.875rem;">Expired</div>
      <div style="font-size:2rem; font-weight:700; color:#EF4444;">2</div>
    </div>
  </div>

  <!-- Table -->
  <div class="hr-card" style="flex:1; overflow-y:auto;">
    <table style="width:100%; border-collapse:collapse; text-align:left;">
      <thead>
        <tr style="border-bottom:1px solid var(--hr-border);">
          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500;">Employee</th>
          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500;">Balance</th>
          <th style="padding:1rem 0; color:var(--hr-text-muted); font-weight:500;">Expiry Date</th>
        </tr>
      </thead>
      <tbody id="hrCompOffTableBody">
        <!-- Injected via script -->
      </tbody>
    </table>
  </div>

</div>

<!-- Assign Comp-Off Modal -->
<div id="hrAssignCompOffModal" class="hr-modal-overlay hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.6); z-index:2000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
  <div class="hr-card" style="width:400px; display:flex; flex-direction:column; padding:0; overflow:hidden;">
    <div style="padding:1.5rem; border-bottom:1px solid var(--hr-border); display:flex; justify-content:space-between; align-items:center;">
      <h3 style="margin:0;">Assign Comp-Off</h3>
      <button onclick="window.UI.closeAssignCompOffModal()" style="background:transparent; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
    </div>

    <div style="padding:2rem;">
      <div style="margin-bottom:1.5rem;">
        <label style="display:block; font-size:0.875rem; font-weight:500; margin-bottom:0.5rem;">Employee</label>
        <select style="width:100%; padding:0.75rem; border:1px solid var(--hr-border); border-radius:8px;">
          <option>Rahul Sharma</option>
          <option>Priya Patel</option>
        </select>
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="display:block; font-size:0.875rem; font-weight:500; margin-bottom:0.5rem;">Worked Date</label>
        <input type="date" style="width:100%; padding:0.75rem; border:1px solid var(--hr-border); border-radius:8px;" />
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="display:block; font-size:0.875rem; font-weight:500; margin-bottom:0.5rem;">Reason</label>
        <input type="text" placeholder="e.g. Worked on weekend" style="width:100%; padding:0.75rem; border:1px solid var(--hr-border); border-radius:8px;" />
      </div>
    </div>

    <div style="padding:1.5rem; border-top:1px solid var(--hr-border); display:flex; justify-content:flex-end; gap:1rem; background:#F8FAFC;">
      <button onclick="window.UI.closeAssignCompOffModal()" style="background:white; border:1px solid var(--hr-border); border-radius:8px; padding:0.75rem 1.5rem; font-weight:500; cursor:pointer;">Cancel</button>
      <button onclick="window.UI.submitAssignCompOff()" class="primary-btn" style="padding:0.75rem 1.5rem;">Save</button>
    </div>
  </div>
</div>

<script src="/modules/hr/compoff/script.js"></script>
