<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Privacy Settings</title>
    <link rel="stylesheet" href="/modules/admin/profile/../../../assets/css/global.css" />
    <link rel="stylesheet" href="/modules/admin/profile/../../../assets/css/forms.css" />
    <link rel="stylesheet" href="/modules/admin/profile/profile-section.css" />
</head>

<body data-page="privacy">
    <div id="navbar"></div>

    <div class="section-shell">
        <div id="sidebar"></div>

        <main class="section-page">
            <section class="section-card">
                <div class="section-header">
                    <div>
                        <p class="eyebrow">Privacy Controls</p>
                        <h1>Visibility and compliance preferences</h1>
                        <p class="muted">Define how admin data, activity and account lifecycle requests are handled.</p>
                    </div>
                    <div class="header-actions">
                        <a class="btn ghost-btn" href="profile.html">Back to Profile Hub</a>
                        <button class="btn btn-primary" data-save="privacy">Save Privacy</button>
                    </div>
                </div>
            </section>

            <section class="section-card">
                <div class="toggle-grid">
                    <label class="toggle-item">
                        <div class="toggle-copy">
                            <h3>Show Profile To Organization</h3>
                            <p>Allow employees to view owner profile details in shared company directories.</p>
                        </div>
                        <input id="showProfile" type="checkbox" />
                    </label>
                    <label class="toggle-item">
                        <div class="toggle-copy">
                            <h3>Activity Tracking</h3>
                            <p>Keep detailed audit and monitoring logs for sensitive admin actions.</p>
                        </div>
                        <input id="activityTracking" type="checkbox" />
                    </label>
                    <label class="toggle-item">
                        <div class="toggle-copy">
                            <h3>Allow Data Export</h3>
                            <p>Enable secure data export requests for compliance and backup workflows.</p>
                        </div>
                        <input id="allowDataExport" type="checkbox" />
                    </label>
                    <label class="toggle-item">
                        <div class="toggle-copy">
                            <h3>Allow Deletion Request</h3>
                            <p>Expose account deletion workflow only when policy and legal retention allow it.</p>
                        </div>
                        <input id="allowDeletionRequest" type="checkbox" />
                    </label>
                </div>
            </section>
        </main>
    </div>

    <script src="/modules/admin/profile/../../../assets/js/api.js"></script>
    <script src="/modules/admin/profile/../../../assets/js/auth.js"></script>
    <script src="/modules/admin/profile/profile-section.js"></script>
</body>

</html>
