<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Departments — JMKC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/modules/admin/_shared/admin-layout.css"/>
  <link rel="stylesheet" href="/modules/admin/_shared/admin.css"/>
  <link rel="stylesheet" href="/modules/admin/departments/departments.css"/>
</head>
<body class="admin-body">
<main class="admin-content">
  <div class="page-top">
    <div class="page-top-left">
      <div class="page-title">🏢 Departments</div>
      <div class="page-subtitle">Manage company departments, roles and teams</div>
    </div>
    <div class="page-top-actions">
      <input type="search" class="form-control" id="deptSearch" placeholder="Search departments..." style="height:36px;width:220px;" oninput="filterDepts()"/>
      <button class="btn btn-primary" onclick="openModal('addDeptModal')">+ Add Department</button>
    </div>
  </div>

  <div class="kpi-grid mb-24" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi-card kpi-card-blue" onclick="window.location.href='/admin/departments'" style="cursor:pointer"><div class="kpi-top"><div class="kpi-icon kpi-icon-blue">🏢</div></div><div class="kpi-value" id="stTotal">—</div><div class="kpi-label">Total Departments</div></div>
    <div class="kpi-card kpi-card-green" onclick="window.location.href='/admin/users'" style="cursor:pointer"><div class="kpi-top"><div class="kpi-icon kpi-icon-green">👥</div></div><div class="kpi-value" id="stEmployees">—</div><div class="kpi-label">Total Employees</div></div>
    <div class="kpi-card kpi-card-orange" onclick="window.location.href='/admin/projects'" style="cursor:pointer"><div class="kpi-top"><div class="kpi-icon kpi-icon-orange">📁</div></div><div class="kpi-value" id="stProjects">—</div><div class="kpi-label">Active Projects</div></div>
    <div class="kpi-card kpi-card-purple"><div class="kpi-top"><div class="kpi-icon kpi-icon-purple">🎯</div></div><div class="kpi-value" id="stPerf">—</div><div class="kpi-label">Avg Performance</div></div>
  </div>

  <div class="grid-auto" id="deptGrid"></div>
</main>

<!-- Add Dept Modal -->
<div class="modal-overlay hidden" id="addDeptModal">
  <div class="modal-box modal-md">
    <div class="modal-header"><div class="modal-title">🏢 Add Department</div><button class="modal-close" onclick="closeModal('addDeptModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Department Name <span class="required">*</span></label><input class="form-control" id="dName" placeholder="e.g. Engineering" required/></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-control" id="dDesc" rows="3" placeholder="Brief description..."></textarea></div>
      <div class="form-group"><label class="form-label">Head of Department</label><select class="form-control" id="dHead"><option value="">Select User</option></select></div>
      <div class="form-group"><label class="form-label">Status</label><select class="form-control" id="dStatus"><option value="ACTIVE">Active</option><option value="INACTIVE">Inactive</option></select></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addDeptModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitDept()">✅ Create</button>
    </div>
  </div>
</div>

<script src="/modules/admin/_shared/admin-api.js"></script>
<script src="/modules/admin/_shared/admin-layout.js"></script>

<script src="/modules/admin/departments/departments.js"></script>
</body>
</html>
