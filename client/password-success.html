<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Updated - JMKC CRM</title>
    <link rel="stylesheet" href="assets/css/variables.css" />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/forms.css" />
    <link rel="stylesheet" href="assets/css/auth.css" />
  </head>

  <body>
    <main class="auth-page-shell auth-page-shell-compact">
      <section class="auth-card auth-recovery-card">
        <div class="auth-card-header">
          <div class="auth-card-brand">JMKC CRM</div>
          <h1>Password Updated Successfully</h1>
          <p>Your password has been reset and your account is secure.</p>
        </div>

        <div class="auth-success-panel">
          <div class="auth-success-check">✔</div>
          <p>You're ready to sign in with your new password.</p>
          <button type="button" class="btn btn-primary btn-full auth-submit" onclick="window.location.href='/login'">Go To Login</button>
        </div>

        <footer class="auth-footer">Copyright © JMKC CRM · Created By Punam</footer>
      </section>
    </main>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/notifications.js"></script>
  </body>

</html>
