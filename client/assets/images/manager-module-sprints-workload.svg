  <text x="88" y="454" fill="#36E0A1" font-family="Arial, sans-serif" font-size="18">Completed: 18</text>
  <text x="88" y="488" fill="#55C6FF" font-family="Arial, sans-serif" font-size="18">In Progress: 10</text>
  <text x="88" y="522" fill="#F7C948" font-family="Arial, sans-serif" font-size="18">Remaining: 4</text>
  <text x="88" y="556" fill="#FF7E8D" font-family="Arial, sans-serif" font-size="18">Risk: 2 blocked tasks</text>

  <rect x="390" y="344" width="322" height="238" rx="22" fill="#0B1730"/>
