  <path d="M432 470H676" stroke="#324765" stroke-width="2"/>
  <path d="M432 510H676" stroke="#324765" stroke-width="2"/>
  <path d="M432 550H676" stroke="#324765" stroke-width="2"/>
  <path d="M444 414 C488 420 520 442 554 460 C590 480 620 520 664 542" stroke="#06B6D4" stroke-width="6" stroke-linecap="round"/>
