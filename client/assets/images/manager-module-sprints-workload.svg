  <rect x="798" y="578" width="740" height="266" rx="22" fill="#0B1730"/>
  <text x="824" y="614" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="22">Manager Actions</text>
  <text x="824" y="654" fill="#9FB4D8" font-family="Arial, sans-serif" font-size="18">Team workload screen -> see overloaded users, free resources, and capacity gaps</text>
  <text x="824" y="688" fill="#9FB4D8" font-family="Arial, sans-serif" font-size="18">Member click -> open member profile or workload detail</text>
  <text x="824" y="722" fill="#9FB4D8" font-family="Arial, sans-serif" font-size="18">Rebalance action -> shift member to another module or project</text>
  <text x="824" y="756" fill="#9FB4D8" font-family="Arial, sans-serif" font-size="18">Hold action -> mark member on hold with reason</text>
  <text x="824" y="790" fill="#9FB4D8" font-family="Arial, sans-serif" font-size="18">Reports click -> open performance, velocity, and completion analytics</text>
