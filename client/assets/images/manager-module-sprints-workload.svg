  <text x="416" y="572" fill="#8EA6CD" font-family="Arial, sans-serif" font-size="16">Expected Completion: 25 May 2026</text>

  <rect x="62" y="614" width="650" height="230" rx="22" fill="#0B1730"/>
  <text x="88" y="650" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="22">Sprint Click Flow</text>
  <text x="88" y="690" fill="#9FB4D8" font-family="Arial, sans-serif" font-size="18">Sprint Create button -> opens sprint setup popup</text>
  <text x="88" y="722" fill="#9FB4D8" font-family="Arial, sans-serif" font-size="18">Task list -> open tasks page filtered by sprint</text>
  <text x="88" y="754" fill="#9FB4D8" font-family="Arial, sans-serif" font-size="18">Burndown chart -> opens reports / sprint analytics</text>
  <text x="88" y="786" fill="#9FB4D8" font-family="Arial, sans-serif" font-size="18">Velocity metric -> used in next sprint planning</text>

  <rect x="770" y="128" width="796" height="754" rx="26" fill="#081225" stroke="#183259"/>
