<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="920" rx="30" fill="#050816"/>
  <text x="40" y="60" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="34" font-weight="700">Sprint Planning + Team Workload</text>
  <text x="40" y="92" fill="#93A9CD" font-family="Arial, sans-serif" font-size="18">Manager sees sprint progress, velocity, burndown, capacity, and overloaded users in one place.</text>

  <rect x="34" y="128" width="706" height="754" rx="26" fill="#081225" stroke="#6D4AFF" stroke-opacity="0.5"/>
  <text x="62" y="170" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">Sprint Module</text>
  <rect x="62" y="196" width="650" height="124" rx="22" fill="#0B1730"/>
  <text x="88" y="232" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="24">Sprint 2 - Active</text>
  <text x="88" y="266" fill="#8EA6CD" font-family="Arial, sans-serif" font-size="18">Goal: Complete student, fees, attendance and HR modules by sprint close.</text>
  <text x="88" y="296" fill="#55C6FF" font-family="Arial, sans-serif" font-size="18">Create Sprint -> set goal -> attach sprint tasks -> track velocity</text>

  <rect x="62" y="344" width="304" height="238" rx="22" fill="#0B1730"/>
