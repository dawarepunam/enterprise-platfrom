<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="920" rx="30" fill="#050816"/>
  <text x="40" y="60" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="34" font-weight="700">Files + Client Updates</text>
  <text x="40" y="92" fill="#93A9CD" font-family="Arial, sans-serif" font-size="18">OneDrive-style file management merged with client communication flow.</text>

  <rect x="36" y="128" width="930" height="756" rx="26" fill="#081225" stroke="#183259"/>
  <text x="64" y="170" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">Files Management</text>
  <rect x="64" y="198" width="874" height="70" rx="18" fill="#0D1B33"/>
  <text x="90" y="240" fill="#D8E6FF" font-family="Arial, sans-serif" font-size="22">Project / School ERP System</text>
  <rect x="726" y="212" width="92" height="34" rx="12" fill="#6D4AFF"/><text x="748" y="235" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16">Upload</text>
  <rect x="832" y="212" width="106" height="34" rx="12" fill="#0B1730"/><text x="854" y="235" fill="#D8E6FF" font-family="Arial, sans-serif" font-size="16">New Folder</text>

  <g font-family="Arial, sans-serif">
    <rect x="64" y="292" width="874" height="74" rx="18" fill="#0B1730"/>
    <text x="92" y="338" fill="#FFFFFF" font-size="20">Documents / Requirements / Reports / UI_Design.fig</text>
    <text x="772" y="338" fill="#8EA6CD" font-size="16">Preview | Download | Share | History</text>
    <rect x="64" y="384" width="874" height="74" rx="18" fill="#0B1730"/>
    <text x="92" y="430" fill="#FFFFFF" font-size="20">Database_Schema.png / SRS_Document.pdf / QA_Checklist.xlsx</text>
    <text x="772" y="430" fill="#8EA6CD" font-size="16">Hover -> actions visible</text>
    <rect x="64" y="490" width="874" height="170" rx="22" fill="#101D37"/>
    <text x="92" y="530" fill="#FFFFFF" font-size="22">Upload Flow</text>
    <text x="92" y="570" fill="#9FB4D8" font-size="18">User Uploads File -> Multer Upload -> OneDrive API -> Share Link Generated -> MongoDB Store</text>
    <text x="92" y="604" fill="#9FB4D8" font-size="18">File card hover -> Preview, Download, Share, Delete, Version History</text>
    <text x="92" y="638" fill="#9FB4D8" font-size="18">Click preview -> modal or file page; click share -> copy share link</text>
  </g>

  <rect x="994" y="128" width="570" height="756" rx="26" fill="#081225" stroke="#6D4AFF" stroke-opacity="0.5"/>
  <text x="1022" y="170" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">Client Update Popup</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="1022" y="198" width="514" height="40" rx="14" fill="#0D1B33"/><text x="1040" y="223" fill="#D8E6FF">Select Client</text>
    <rect x="1022" y="250" width="514" height="120" rx="14" fill="#0D1B33"/><text x="1040" y="318" fill="#D8E6FF">Write delivery update, milestone status, risks, and next steps...</text>
    <rect x="1022" y="382" width="514" height="40" rx="14" fill="#0D1B33"/><text x="1040" y="407" fill="#D8E6FF">Attach Files</text>
    <rect x="1334" y="438" width="202" height="36" rx="12" fill="#6D4AFF"/><text x="1382" y="462" fill="#FFFFFF">Send Email</text>
    <rect x="1022" y="506" width="514" height="192" rx="22" fill="#0B1730"/>
    <text x="1048" y="548" fill="#FFFFFF" font-size="22">Client Flow</text>
    <text x="1048" y="588" fill="#9FB4D8" font-size="18">View Client -> opens client profile / portal context</text>
    <text x="1048" y="620" fill="#9FB4D8" font-size="18">Send Update -> popup with note + attachment flow</text>
    <text x="1048" y="652" fill="#9FB4D8" font-size="18">Task Completed -> Client Dashboard Updated automatically</text>
    <text x="1048" y="684" fill="#9FB4D8" font-size="18">File attachment -> share link added in client message</text>
  </g>
</svg>
