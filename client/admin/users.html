<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – User Management</title>
    <!-- Google Font for premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/admin-shell.css" />
    <link rel="stylesheet" href="../modules/admin/admin-command-center.css" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, hsl(210, 30%, 15%), hsl(210, 30%, 8%));
            color: #e0e0e0;
        }
        .user-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease;
        }
        .user-card:hover { transform: translateY(-2px); }
        .form-section {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .form-section h2 { margin-bottom: 1rem; color: #fff; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #444;
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: #e0e0e0;
        }
        .btn-primary {
            background: hsl(200, 70%, 55%);
            border: none;
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: hsl(200, 70%, 45%); }
    </style>
</head>
<body>
    <div id="navbar"></div>
    <div class="dashboard-shell">
        <div id="sidebar"></div>
        <main class="dashboard-page">
            <section class="form-section">
                <h2>Create New User</h2>
                <form id="createUserForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Temporary Password</label>
                        <input type="password" id="password" name="password" required />
                    </div>
                    <div class="form-group">
                        <label for="role">Role</label>
                        <select id="role" name="role" required>
                            <option value="ADMIN">Admin</option>
                            <option value="MANAGER">Manager</option>
                            <option value="TEAM_LEAD">Team Lead</option>
                            <option value="MEMBER">Member</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department">
                            <option value="">Select Department</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Create User</button>
                </form>
            </section>
            <section class="users-list">
                <h2>Existing Users</h2>
                <div id="usersContainer"></div>
            </section>
        </main>
    </div>

    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/admin-shell.js"></script>
    <script>
        // Load and render users
        async function loadUsers() {
            try {
                // API.get returns parsed JSON directly
                const data = await api.get('/users');
                console.log('Load users response:', data);
                const container = document.getElementById('usersContainer');
                container.innerHTML = '';
                if (data && data.success && Array.isArray(data.data)) {
                    console.log('User count:', data.data.length);
                    data.data.forEach(user => {
                        const card = document.createElement('div');
                        card.className = 'user-card';
                        card.innerHTML = `<div>
                                            <strong>${user.name}</strong> (${user.email})<br/>
                                            Role: ${user.role} | Dept: ${user.department || '—'}
                                         </div>
                                         <div>Emp ID: ${user.employeeId || '—'}</div>`;
                        container.appendChild(card);
                    });
                } else {
                    container.textContent = 'No users found.';
                }
            } catch (e) {
                console.error('Error loading users:', e);
            }
        }

        // Load department options for the user form
        async function loadDepartments() {
            try {
                const data = await api.get('/departments');
                const select = document.getElementById('department');
                if (select && data && data.success && Array.isArray(data.data)) {
                    select.innerHTML = '<option value="">Select Department</option>' + data.data.map(d => `<option value="${d._id}">${d.name}</option>`).join('');
                }
            } catch (e) {
                console.error('Error loading departments for user form:', e);
            }
        }

            document.getElementById('createUserForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.target;
                const payload = {
                    name: form.name.value.trim(),
                    email: form.email.value.trim(),
                    password: form.password.value,
                    role: form.role.value,
                    // If department is empty string, send null so backend can handle as none
                    department: form.department.value.trim() || null
                };
                try {
                    const result = await api.post('/users', payload);
                    console.log('Create user result:', result);
                    if (result.success) {
                        alert('User created successfully');
                        form.reset();
                    } else {
                        alert('Error: ' + (result.message || 'Failed to create'));
                    }
                } catch (err) {
                    console.error('Create user error:', err);
                    alert('Unexpected error');
                }
                // Refresh the user list after a short delay to ensure DB write
                setTimeout(loadUsers, 300);
            });

        // Initial load
        document.addEventListener('DOMContentLoaded', () => {
            loadUsers();
            loadDepartments();
        });
    </script>
</body>
</html>
