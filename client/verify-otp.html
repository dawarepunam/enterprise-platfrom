<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Verify OTP - JMKC CRM</title>
        <link rel="stylesheet" href="assets/css/variables.css" />
        <link rel="stylesheet" href="assets/css/global.css" />
        <link rel="stylesheet" href="assets/css/forms.css" />
        <link rel="stylesheet" href="assets/css/auth.css" />
    </head>

    <body>
        <main class="auth-page-shell auth-page-shell-compact">
            <section class="auth-card auth-recovery-card auth-step-card">
                <div class="auth-step-pill">Verify OTP</div>
                <div class="auth-card-header">
                    <div class="auth-card-icon">🛡️</div>
                    <div>
                        <h1>Verify Code</h1>
                        <p>Enter the 6-digit verification code sent to your
                            email.</p>
                    </div>
                </div>

                <form id="verifyOtpForm" class="auth-form auth-verify-card">
                    <div class="form-group">
                        <label for="verifyEmail">Email</label>
                        <input type="email" id="verifyEmail" disabled />
                    </div>

                    <div class="auth-otp-row" data-otp-inputs>
                        <input type="text" inputmode="numeric" pattern="[0-9]*"
                            autocomplete="one-time-code" maxlength="1" />
                        <input type="text" inputmode="numeric" pattern="[0-9]*"
                            autocomplete="one-time-code" maxlength="1" />
                        <input type="text" inputmode="numeric" pattern="[0-9]*"
                            autocomplete="one-time-code" maxlength="1" />
                        <input type="text" inputmode="numeric" pattern="[0-9]*"
                            autocomplete="one-time-code" maxlength="1" />
                        <input type="text" inputmode="numeric" pattern="[0-9]*"
                            autocomplete="one-time-code" maxlength="1" />
                        <input type="text" inputmode="numeric" pattern="[0-9]*"
                            autocomplete="one-time-code" maxlength="1" />
                    </div>

                    <div class="auth-countdown">Resend OTP in <strong
                            id="otpTimer">00:45</strong></div>
                    <button type="submit" id="verifyOtpButton"
                        class="btn btn-primary btn-full auth-submit">Verify
                        OTP</button>
                    <button type="button" id="resendOtpButton"
                        class="auth-text-button">Resend Code</button>
                </form>

                <div class="auth-links auth-step-links">
                    <a class="auth-link-animated"
                        href="/forgot-password.html">Return to Forgot
                        Password</a>
                </div>
                <footer class="auth-footer">Copyright © JMKC CRM · Created By
                    Punam</footer>
            </section>
        </main>

        <script src="assets/js/api.js"></script>
        <script src="assets/js/notifications.js"></script>
        <script src="assets/js/auth.js"></script>
    </body>

</html>
