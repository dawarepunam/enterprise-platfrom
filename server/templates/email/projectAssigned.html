<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Project Assigned</title></head>
<body style="margin:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#0f172a;">
  <div style="max-width:640px;margin:32px auto;background:#ffffff;border-radius:20px;overflow:hidden;">
    <div style="padding:28px;background:#ecfeff;"><h1 style="margin:0;font-size:28px;">Project ownership assigned</h1></div>
    <div style="padding:28px;">
      <p>Hello {{name}},</p>
      <p>You are now responsible for the project <strong>{{projectName}}</strong>.</p>
      <p>Client: <strong>{{clientName}}</strong><br />Budget: <strong>{{budget}}</strong><br />Deadline: <strong>{{deadline}}</strong></p>
      <p>Please create the team structure, break the scope into tasks, and start the team communication room.</p>
    </div>
  </div>
</body>
</html>
