<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Task Completed</title></head>
<body style="margin:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#0f172a;">
  <div style="max-width:640px;margin:32px auto;background:#ffffff;border-radius:20px;overflow:hidden;">
    <div style="padding:28px;background:#dcfce7;"><h1 style="margin:0;font-size:28px;">Task completed</h1></div>
    <div style="padding:28px;">
      <p>Hello {{name}},</p>
      <p>The task <strong>{{taskTitle}}</strong> has been marked complete and moved out of the active execution queue.</p>
      <p>Project: <strong>{{projectName}}</strong><br />Completed by: <strong>{{completedBy}}</strong></p>
      <p>You can review the proof, final comments, and downstream impact from the dashboard.</p>
    </div>
  </div>
</body>
</html>
