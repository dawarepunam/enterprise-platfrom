<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Task Assigned</title></head>
<body style="margin:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#0f172a;">
  <div style="max-width:640px;margin:32px auto;background:#ffffff;border-radius:20px;overflow:hidden;">
    <div style="padding:28px;background:#dbeafe;"><h1 style="margin:0;font-size:28px;">New task assigned</h1></div>
    <div style="padding:28px;">
      <p>Hello {{name}},</p>
      <p>You have been assigned <strong>{{taskTitle}}</strong> under <strong>{{projectName}}</strong>.</p>
      <p>Priority: <strong>{{priority}}</strong><br />Deadline: <strong>{{deadline}}</strong></p>
      <p>Please open your task workspace, review acceptance criteria, and update progress in real time.</p>
    </div>
  </div>
</body>
</html>
