<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Quotation Approved</title></head>
<body style="margin:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#0f172a;">
  <div style="max-width:640px;margin:32px auto;background:#ffffff;border-radius:20px;overflow:hidden;">
    <div style="padding:28px;background:#ede9fe;"><h1 style="margin:0;font-size:28px;">Quotation approved</h1></div>
    <div style="padding:28px;">
      <p>Hello {{name}},</p>
      <p>The quotation <strong>{{quotationTitle}}</strong> for <strong>{{clientName}}</strong> has been approved.</p>
      <p>Amount: <strong>{{amount}}</strong><br />Approved on: <strong>{{approvedAt}}</strong></p>
      <p>Please continue delivery and keep the client portal updated with progress and next actions.</p>
    </div>
  </div>
</body>
</html>
