<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Lead Assigned</title></head>
<body style="margin:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#0f172a;">
  <div style="max-width:640px;margin:32px auto;background:#ffffff;border-radius:20px;overflow:hidden;">
    <div style="padding:28px;background:#fef3c7;"><h1 style="margin:0;font-size:28px;">New lead assigned</h1></div>
    <div style="padding:28px;">
      <p>Hello {{name}},</p>
      <p>A new lead has been assigned for follow-up.</p>
      <p>Company: <strong>{{company}}</strong><br />Contact: <strong>{{contact}}</strong><br />Source: <strong>{{source}}</strong></p>
      <p>Please update call notes, next follow-up, and conversion status inside the CRM flow.</p>
    </div>
  </div>
</body>
</html>
