<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Password Reset</title></head>
<body style="margin:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#0f172a;">
  <div style="max-width:640px;margin:32px auto;background:#ffffff;border-radius:20px;overflow:hidden;">
    <div style="padding:28px;background:#fee2e2;"><h1 style="margin:0;font-size:28px;">Reset your password</h1></div>
    <div style="padding:28px;">
      <p>Hello {{name}},</p>
      <p>We received a request to reset your password for the Smart Enterprise account linked to <strong>{{email}}</strong>.</p>
      <p><a href="{{resetUrl}}" style="display:inline-block;padding:14px 22px;border-radius:999px;background:#2563eb;color:#ffffff;text-decoration:none;font-weight:700;">Reset Password</a></p>
      <p>If you did not request this change, please ignore this email and review your active sessions.</p>
    </div>
  </div>
</body>
</html>
